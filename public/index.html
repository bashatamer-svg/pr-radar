<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PR Radar — Brand &amp; Reputation</title>
<meta name="description" content="Daily brand &amp; reputation monitor for Vodafone Egypt — Vodafone, Orange, WE and e&amp; in the Egyptian mobile market, with sentiment, author and coverage spread.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#f1f2f5">
<style>
  :root{
    --red:#e60000; --red-deep:#b60009; --red-glow:rgba(230,0,0,.28);
    --bg:#f1f2f5; --card:#ffffff; --raise:#f6f7f9;
    --ink:#16191f; --ink-2:#3b434e; --muted:#6c7480; --faint:#9aa2ad; --hair:#e7e9ee; --hair-2:#eef0f3;
    --neg:#e60000; --neg-bg:#fff2f0; --neg-line:#ffd4cf;
    --pos:#0f9d58; --pos-bg:#edfaf1; --pos-line:#c3e9d1;
    --neu:#5b6675; --neu-bg:#f0f3f7; --neu-line:#e0e6ec;
    --amber:#d97706;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --mh:56px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{color:var(--red)}
  .wrap{max-width:840px;margin:0 auto;min-height:100vh}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:8px}

  /* ── header ── */
  .top{position:sticky;top:0;z-index:40;height:var(--mh);display:flex;align-items:center;gap:11px;padding:0 16px;
       background:rgba(255,255,255,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--hair)}
  .mark{position:relative;flex:none;width:34px;height:34px;border-radius:11px;background:var(--ink);overflow:hidden;
        display:grid;place-items:center}
  .mark .sweep{position:absolute;inset:-40%;background:conic-gradient(from 0deg,transparent 300deg,rgba(230,0,0,.7) 358deg,#fff 360deg);
               animation:sweep 3.6s linear infinite}
  .mark .glyph{position:relative;font-weight:800;font-size:13px;color:#fff;letter-spacing:-.02em}
  @keyframes sweep{to{transform:rotate(360deg)}}
  .ttl{flex:1;min-width:0}
  .ttl .h1{font-size:16px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .ttl .sub{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:500}
  .trends{flex:none;font-size:11.5px;font-weight:700;color:var(--ink-2);text-decoration:none;background:var(--raise);
          border:1px solid var(--hair);border-radius:9px;padding:8px 11px;white-space:nowrap}
  .trends:hover{border-color:var(--faint)}
  .clock{flex:none;text-align:right;background:var(--raise);border:1px solid var(--hair);border-radius:9px;padding:5px 9px}
  .clock .t{font-family:var(--mono);font-size:12px;font-weight:700;line-height:1.1}
  .clock .d{font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.08em}

  /* ── spotlight ── */
  .spotlight{display:none;align-items:center;gap:11px;cursor:pointer;margin:12px 16px 0;color:#fff;
             padding:13px 15px;border-radius:15px;line-height:1.35;font-size:13px;
             background:linear-gradient(120deg,#c2000a,#e60000);box-shadow:0 8px 22px -8px var(--red-glow)}
  .spotlight.on{display:flex;animation:rise .5s both}
  .spotlight .pin{flex:none;position:relative;width:9px;height:9px}
  .spotlight .pin::before,.spotlight .pin::after{content:"";position:absolute;inset:0;border-radius:50%;background:#fff}
  .spotlight .pin::after{animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{0%{transform:scale(1);opacity:.7}80%,100%{transform:scale(2.6);opacity:0}}
  .spotlight .txt{flex:1;min-width:0}
  .spotlight .lab{font-size:9px;font-weight:800;letter-spacing:.16em;opacity:.85;text-transform:uppercase}
  .spotlight b{font-weight:800}
  .spotlight .go{flex:none;font-size:11px;font-weight:700;background:rgba(255,255,255,.22);padding:6px 10px;border-radius:9px;white-space:nowrap}

  /* ── pulse: Vodafone hero + competitor tiles ── */
  .pulse[hidden]{display:none}
  .pulse{padding:14px 16px 4px}
  .pulse .ph{font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--muted);margin:0 2px 9px;
             display:flex;align-items:center;gap:7px}
  .pulse .ph .dt{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 0 3px var(--pos-bg)}
  .hero{position:relative;display:flex;align-items:center;gap:14px;cursor:pointer;background:var(--card);
        border:1px solid var(--hair);border-radius:18px;padding:16px 17px;box-shadow:0 2px 10px -6px rgba(20,23,28,.15);
        transition:transform .12s,box-shadow .2s;animation:rise .5s both}
  .hero:active{transform:scale(.99)}
  .hero[aria-pressed=true]{border-color:var(--red);box-shadow:0 0 0 2px var(--red-glow)}
  .hero.alert{background:linear-gradient(180deg,var(--neg-bg),var(--card) 60%)}
  .hero.alert::after{content:"";position:absolute;inset:-1px;border-radius:18px;pointer-events:none;
                     box-shadow:0 0 0 0 var(--red-glow);animation:ring 2.4s ease-out infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(230,0,0,.32)}70%,100%{box-shadow:0 0 0 12px rgba(230,0,0,0)}}
  .hero .hlogo{flex:none;width:44px;height:44px;border-radius:13px;background:var(--red);display:grid;place-items:center;
               color:#fff;font-weight:800;font-size:20px;box-shadow:0 6px 16px -6px var(--red-glow)}
  .hero .hbody{flex:1;min-width:0}
  .hero .hb1{display:flex;align-items:baseline;gap:8px}
  .hero .hbrand{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .hero .hpill{font-size:10px;font-weight:800;letter-spacing:.04em;padding:3px 9px;border-radius:20px;text-transform:uppercase}
  .hero .hbig{display:flex;align-items:baseline;gap:6px;margin-top:7px}
  .hero .hn{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .hero .hu{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.15}
  .hbar{display:flex;height:7px;border-radius:5px;overflow:hidden;margin-top:11px;background:var(--hair-2)}
  .hbar i{display:block;height:100%;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:9px}
  .tile{cursor:pointer;background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:11px 12px;text-align:left;
        font-family:var(--sans);transition:transform .12s,border-color .15s;animation:rise .5s both}
  .tile:active{transform:scale(.98)}
  .tile[aria-pressed=true]{border-color:var(--tc);box-shadow:0 0 0 2px color-mix(in srgb,var(--tc) 22%,transparent)}
  .tile .tt{display:flex;align-items:center;gap:6px}
  .tile .tdot{width:8px;height:8px;border-radius:3px;flex:none}
  .tile .tb{font-size:12.5px;font-weight:800}
  .tile .tbar{display:flex;height:5px;border-radius:4px;overflow:hidden;margin-top:9px;background:var(--hair-2)}
  .tile .tbar i{display:block;height:100%;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .tile .tc-cnt{margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--faint)}
  .tile .tc-cnt b{color:var(--ink-2)} .tile .tc-cnt .neg{color:var(--neg);font-weight:700}

  /* ── filter bar ── */
  .bar2[hidden]{display:none}
  .bar2{position:sticky;top:var(--mh);z-index:30;background:rgba(241,242,245,.9);backdrop-filter:blur(12px);
        border-bottom:1px solid var(--hair);padding:11px 16px 10px;margin-top:12px}
  .status{font-size:12px;color:var(--muted);margin-bottom:9px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .status b{color:var(--ink);font-weight:700} .status .neg{color:var(--neg);font-weight:700} .status .sep{color:var(--faint)}
  .frow{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
  .frow::-webkit-scrollbar{display:none}
  .frow+.frow{margin-top:7px}
  .flabel{flex:none;align-self:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding-right:2px}
  .chip{flex:none;cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--ink-2);
        font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:11px;white-space:nowrap;transition:all .12s}
  .chip:hover{border-color:var(--faint)}
  .chip[aria-pressed=true]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.alert[aria-pressed=true]{background:var(--red);border-color:var(--red);box-shadow:0 6px 16px -8px var(--red-glow)}

  /* ── list ── */
  .list{padding:10px 16px 76px}
  .empty,.gate{text-align:center;color:var(--muted);padding:64px 26px;font-size:14px;line-height:1.7}
  .gate code{background:var(--card);border:1px solid var(--hair);padding:2px 8px;border-radius:6px;color:var(--ink);font-family:var(--mono)}
  .sechead{display:flex;align-items:center;gap:9px;padding:20px 2px 9px}
  .sechead .tick{width:10px;height:10px;border-radius:4px;flex:none}
  .sechead .lab{font-size:13px;font-weight:800;letter-spacing:-.01em}
  .sechead .n{font-size:11px;font-weight:700;color:#fff;background:var(--faint);border-radius:20px;padding:1px 8px;min-width:20px;text-align:center}

  /* ── card ── */
  .card{position:relative;background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:16px 17px;margin:11px 0;
        box-shadow:0 2px 12px -8px rgba(20,23,28,.18);animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card.negative{background:linear-gradient(180deg,var(--neg-bg),var(--card) 42%);border-color:var(--neg-line)}
  .card.positive{border-color:var(--pos-line)}
  .card.crit::before{content:"";position:absolute;inset:-1px;border-radius:18px;pointer-events:none;animation:ring 2.6s ease-out infinite}
  .c-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .metas{display:flex;flex-wrap:wrap;align-items:center;gap:7px;font-size:11px;color:var(--faint)}
  .bchip{color:#fff;font-weight:800;padding:3px 9px;border-radius:7px;font-size:10px;letter-spacing:.02em}
  .spread{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-weight:700;font-size:10px;
          padding:3px 8px;border-radius:7px;background:var(--raise);color:var(--ink-2);border:1px solid var(--hair)}
  .spread.hot{background:var(--neg);color:#fff;border-color:var(--neg)}
  .cat{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.03em;text-transform:uppercase}
  .age{color:var(--faint)}
  .dots{white-space:nowrap;letter-spacing:2px;font-size:11px;flex:none}
  .headline{font-size:18px;font-weight:750;line-height:1.32;margin:11px 0 0;letter-spacing:-.02em;text-wrap:pretty}
  .headline a{color:var(--ink);text-decoration:none}
  .headline a:hover{color:var(--red-deep)}
  .subrow{margin-top:10px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12px}
  .sent{font-size:10px;font-weight:800;letter-spacing:.04em;padding:4px 10px;border-radius:20px}
  .sent.negative{background:var(--neg-bg);color:var(--red-deep);box-shadow:inset 0 0 0 1px var(--neg-line)}
  .sent.positive{background:var(--pos-bg);color:var(--pos);box-shadow:inset 0 0 0 1px var(--pos-line)}
  .sent.neutral{background:var(--neu-bg);color:var(--neu);box-shadow:inset 0 0 0 1px var(--neu-line)}
  .by{color:var(--ink-2);font-weight:500} .by.none{color:var(--faint)}
  .due{margin-left:auto;font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;
       background:#fff5e6;color:var(--amber);box-shadow:inset 0 0 0 1px #f5dcb0}
  .due.hot{background:var(--neg-bg);color:var(--red-deep);box-shadow:inset 0 0 0 1px var(--neg-line)}
  .summary{font-size:14px;line-height:1.58;color:var(--ink-2);margin-top:10px}

  /* ── bidi: mixed Arabic/English text ──
     Headlines and summaries freely mix Arabic with Latin brand tokens
     ("Vodafone Cash", "5G", numbers). With the page's LTR base direction the
     Unicode bidi algorithm scrambles their ordering and drops punctuation to
     the wrong end. unicode-bidi:plaintext makes each block take its base
     direction from its OWN first strong character (like dir="auto"), and
     text-align:start aligns it to the matching side — Arabic headlines read
     right-to-left from the right, English ones exactly as before. */
  .headline,.summary,.angle td:not(.k),.angle .plain,.cov .row,#spotlightText{
    unicode-bidi:plaintext;text-align:start}
  .by{unicode-bidi:plaintext}

  .angle{margin-top:13px;border-radius:14px;padding:13px 14px;background:var(--neu-bg)}
  .card.negative .angle{background:var(--neg-bg);box-shadow:inset 0 0 0 1px var(--neg-line)}
  .card.positive .angle{background:var(--pos-bg);box-shadow:inset 0 0 0 1px var(--pos-line)}
  .angle .lab{font-size:9.5px;font-weight:800;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
  .angle table{border-collapse:collapse;width:100%}
  .angle td{vertical-align:top;padding:4px 0;font-size:13px;line-height:1.5;color:var(--ink-2)}
  .angle td.k{width:74px;padding-right:12px;font-size:9.5px;font-weight:800;letter-spacing:.06em;color:var(--red);text-transform:uppercase;white-space:nowrap;padding-top:5px}
  .angle .plain{font-size:13px;line-height:1.5;color:var(--ink-2)}

  .cov{margin-top:12px}
  .cov summary{cursor:pointer;list-style:none;font-size:11.5px;font-weight:700;color:var(--ink-2);padding:8px 12px;
               background:var(--raise);border:1px solid var(--hair);border-radius:11px;display:flex;align-items:center;gap:7px}
  .cov summary::-webkit-details-marker{display:none}
  .cov summary .chev{margin-left:auto;color:var(--faint);transition:transform .2s}
  .cov[open] summary .chev{transform:rotate(90deg)}
  .cov[open] summary{border-radius:11px 11px 0 0;border-bottom:none}
  .cov .rows{background:var(--card);border:1px solid var(--hair);border-top:none;border-radius:0 0 11px 11px;padding:9px 13px}
  .cov .row{font-size:12px;line-height:1.65;color:var(--ink-2);padding:2px 0}
  .cov .row a{color:var(--ink-2);text-decoration:none;font-weight:600}
  .cov .row a:hover{color:var(--red)}
  .cov .row .au{color:var(--faint)}

  .foot{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--hair-2)}
  .btn{cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--ink-2);font-family:var(--sans);
       font-size:12.5px;font-weight:700;padding:9px 13px;border-radius:11px;line-height:1;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
  .btn:hover{border-color:var(--faint)}
  .btn.copied{background:var(--pos);color:#fff;border-color:var(--pos)}
  .btn.open{margin-left:auto;color:var(--red);border-color:var(--neg-line);background:var(--neg-bg)}
  .btn.open:hover{background:#ffe7e3}
  .fb{cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--muted);font-size:13px;
      width:38px;height:36px;border-radius:11px;line-height:1;font-family:var(--sans)}
  .fb:hover{border-color:var(--faint)}
  .fb.up[aria-pressed=true]{background:var(--pos);color:#fff;border-color:var(--pos)}
  .fb.down[aria-pressed=true]{background:var(--red);color:#fff;border-color:var(--red)}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="mark" aria-hidden="true"><span class="sweep"></span><span class="glyph">PR</span></div>
    <div class="ttl"><div class="h1">PR Radar</div><div class="sub">Brand &amp; Reputation · Vodafone Egypt</div></div>
    <a class="trends" id="trendsLink" href="/stats" title="Trends — share of voice &amp; sentiment over time">Trends</a>
    <div class="clock"><div class="t" id="clockTime">—</div><div class="d" id="clockDate">—</div></div>
  </header>

  <button class="spotlight" id="spotlight" type="button">
    <span class="pin"></span>
    <span class="txt"><span class="lab">Needs eyes now</span><br><span id="spotlightText"></span></span>
    <span class="go">Jump ↓</span>
  </button>

  <div class="pulse" id="pulse" hidden></div>

  <div class="bar2" id="bar2" hidden>
    <div class="status" id="status"></div>
    <div class="frow" id="sentRow"></div>
    <div class="frow" id="winRow"></div>
  </div>

  <main class="list" id="list"><div class="empty">Loading the board…</div></main>
</div>

<script>
const $ = (s, r=document) => r.querySelector(s);
const esc = (s) => String(s==null?'':s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;

const params = new URLSearchParams(location.search);
const token = params.get('t') || localStorage.getItem('pr_token') || '';
if (params.get('t')) localStorage.setItem('pr_token', params.get('t'));
if (token) $('#trendsLink').href = `/stats?t=${encodeURIComponent(token)}`;

const BRANDS = ['Vodafone','Orange','WE','e&'];
const BRAND_COLOR = { Vodafone:'#e60000', Orange:'#ff7900', WE:'#7b1fa2', 'e&':'#00857b', market:'#6c7480' };
const SENT = {
  negative:{ label:'Negative', color:'#e60000', tag:'⚠' },
  positive:{ label:'Positive', color:'#0f9d58', tag:'✓' },
  neutral :{ label:'Neutral',  color:'#5b6675', tag:'•' },
};
const IMP = {5:'#e60000',4:'#f27100',3:'#e2a900',2:'#3a7ac2',1:'#9aa2ad'};

let ITEMS=[]; let fBrand='all', fSent='all', fWin=Number(localStorage.getItem('pr_win'))||2;

function clock(){
  const now=new Date();
  $('#clockDate').textContent=now.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',timeZone:'Africa/Cairo'}).toUpperCase();
  $('#clockTime').textContent=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Africa/Cairo'})+' CAI';
}
clock(); setInterval(clock,30000);

const sentOf = it => SENT[it.sentiment]?it.sentiment:'neutral';
const spreadOf = it => Array.isArray(it.instances)?it.instances.filter(x=>x&&(x.outlet||x.url)).length:0;
const linkOf = it => it.resolved_url || it.url || (it.id?`/api/go?id=${it.id}`:'#');
const isCrit = it => sentOf(it)==='negative' && ((it.importance||0)>=5 || (it.brand==='Vodafone'&&(it.importance||0)>=4));

function dots(imp){ const n=Math.max(1,Math.min(5,imp||1)); let o=''; for(let i=1;i<=5;i++) o+=`<span style="color:${i<=n?IMP[n]:'#dfe3e8'}">&#9679;</span>`; return o; }
function ageLabel(it){ const t=it.published_at||it.seen_at; if(!t) return ''; const h=Math.max(0,(Date.now()-new Date(t).getTime())/36e5); if(h<1) return 'just now'; if(h<24) return Math.round(h)+'h ago'; return Math.round(h/24)+'d ago'; }
function dueLabel(it){ if(!it.deadline) return ''; const h=(new Date(it.deadline)-Date.now())/36e5; if(h<0) return 'overdue'; if(h<1) return 'due <1h'; if(h<48) return 'due '+Math.round(h)+'h'; return 'due '+Math.round(h/24)+'d'; }
function animateBars(root=document){ const els=root.querySelectorAll('[data-w]'); if(RM){els.forEach(i=>i.style.width=i.dataset.w);return;} requestAnimationFrame(()=>els.forEach(i=>i.style.width=i.dataset.w)); }
function countUp(el,to){ if(!el) return; if(RM||to<=0){el.textContent=to;return;} let s=null; const step=t=>{if(!s)s=t;const p=Math.min(1,(t-s)/650);el.textContent=Math.round(p*to);if(p<1)requestAnimationFrame(step);}; requestAnimationFrame(step); }
function stagger(root){ if(RM) return; root.querySelectorAll('.card').forEach((c,i)=>c.style.animationDelay=Math.min(i*45,400)+'ms'); }

/* ── pulse: Vodafone hero + competitor tiles ── */
function buildPulse(){
  const V='Vodafone'; const vr=ITEMS.filter(i=>(i.brand||'')===V);
  const vneg=vr.filter(i=>sentOf(i)==='negative').length, vpos=vr.filter(i=>sentOf(i)==='positive').length, vneu=vr.length-vneg-vpos;
  const vsev=Math.max(0,...vr.filter(i=>sentOf(i)==='negative').map(i=>i.importance||0));
  let pill,pillbg,pillc,alert=false;
  if(vsev>=4){pill='Alert';pillbg='var(--neg-bg)';pillc='var(--red-deep)';alert=true;}
  else if(vneg>0){pill='Watch';pillbg='#fff5e6';pillc='var(--amber)';}
  else {pill='Clear';pillbg='var(--pos-bg)';pillc='var(--pos)';}
  const vtot=vr.length||1;
  const vseg=(n,c)=>n?`<i data-w="${(n/vtot*100).toFixed(1)}%" style="background:${c}"></i>`:'';
  const vbar=vr.length?vseg(vneg,'#e60000')+vseg(vneu,'#d3dae1')+vseg(vpos,'#0f9d58'):`<i data-w="100%" style="background:#e7e9ee"></i>`;

  const tiles=BRANDS.filter(b=>b!==V).map(b=>{
    const rows=ITEMS.filter(i=>(i.brand||'')===b);
    const neg=rows.filter(i=>sentOf(i)==='negative').length, pos=rows.filter(i=>sentOf(i)==='positive').length, neu=rows.length-neg-pos, tot=rows.length||1;
    const seg=(n,c)=>n?`<i data-w="${(n/tot*100).toFixed(1)}%" style="background:${c}"></i>`:'';
    const bar=rows.length?seg(neg,'#e60000')+seg(neu,'#d3dae1')+seg(pos,'#0f9d58'):`<i data-w="100%" style="background:#e7e9ee"></i>`;
    const cnt=rows.length?`<span class="${neg?'neg':''}"><b>${neg}</b></span> neg · ${rows.length}`:'no items';
    return `<button class="tile" type="button" data-b="${esc(b)}" aria-pressed="${fBrand===b}" style="--tc:${BRAND_COLOR[b]}">
      <span class="tt"><span class="tdot" style="background:${BRAND_COLOR[b]}"></span><span class="tb">${esc(b)}</span></span>
      <span class="tbar">${bar}</span><span class="tc-cnt">${cnt}</span></button>`;
  }).join('');

  $('#pulse').innerHTML=
    `<div class="ph"><span class="dt"></span>Today’s reputation pulse</div>
     <div class="hero ${alert?'alert':''}" role="button" tabindex="0" data-b="${V}" aria-pressed="${fBrand===V}">
       <div class="hlogo">V</div>
       <div class="hbody">
         <div class="hb1"><span class="hbrand">Vodafone</span><span class="hpill" style="background:${pillbg};color:${pillc}">${pill}</span></div>
         <div class="hbig"><span class="hn" id="vNeg">0</span><span class="hu">negative<br>of ${vr.length} tracked</span></div>
         <div class="hbar">${vbar}</div>
       </div></div>
     <div class="tiles">${tiles}</div>`;
  countUp($('#vNeg'),vneg);
  const hero=$('#pulse .hero');
  const toggleV=()=>{ fBrand=(fBrand===V)?'all':V; syncControls(); render(); };
  hero.onclick=toggleV; hero.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleV();} };
  $('#pulse').querySelectorAll('.tile').forEach(c=>c.onclick=()=>{ fBrand=(fBrand===c.dataset.b)?'all':c.dataset.b; syncControls(); render(); });
  $('#pulse').hidden=false;
  animateBars($('#pulse'));
}

function buildSpotlight(){
  const el=$('#spotlight');
  const worst=ITEMS.filter(i=>sentOf(i)==='negative').sort((a,b)=>(b.importance||0)-(a.importance||0)||spreadOf(b)-spreadOf(a))[0];
  const spread=worst?spreadOf(worst):0;
  if(worst&&((worst.importance||0)>=4||spread>=4)){
    const where=spread>1?` · ${spread} outlets`:'';
    // <bdi> isolates the headline's direction from the Latin "Brand · N outlets"
    // prefix — otherwise an Arabic headline inherits the span's LTR base and
    // scrambles (5G splits, trailing ! jumps to the wrong end).
    $('#spotlightText').innerHTML=`<b>${esc(worst.brand||'Market')}${where}</b> — <bdi>${esc(worst.headline)}</bdi>`;
    el.classList.add('on');
    el.onclick=()=>{ const c=document.getElementById('item-'+worst.id); if(c){ c.scrollIntoView({behavior:'smooth',block:'center'}); c.style.transition='box-shadow .3s'; c.style.boxShadow='0 0 0 3px var(--red-glow)'; setTimeout(()=>c.style.boxShadow='',1500);} };
  } else el.classList.remove('on');
}

function angleHtml(text){
  const src=String(text||'').trim(); if(!src) return '';
  const lines=[];
  for(const raw of src.split(/\r?\n+/)){ const m=raw.trim().match(/^([A-Za-z][A-Za-z \/&]*?)\s*[·:\-–—]\s*(.*)$/); if(!m) continue; const v=m[2].trim(); if(!v||/^[—–\-·.\s]*$/.test(v)) continue; lines.push([m[1].trim(),v]); }
  const body=lines.length?`<table>${lines.map(([k,v])=>`<tr><td class="k">${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')}</table>`:`<div class="plain">${esc(src)}</div>`;
  return `<div class="angle"><div class="lab">What to do with this</div>${body}</div>`;
}
function coverageHtml(insts){
  const list=Array.isArray(insts)?insts.filter(x=>x&&(x.outlet||x.url)):[]; if(list.length<2) return '';
  const rows=list.slice(0,16).map(x=>{ const name=esc(x.outlet||'—'); const link=x.url?`<a href="${esc(x.url)}" target="_blank" rel="noopener">${name}</a>`:`<span style="font-weight:600">${name}</span>`; const by=x.author?` <span class="au">· ${esc(x.author)}</span>`:''; return `<div class="row">${link}${by}</div>`; }).join('');
  const more=list.length>16?`<div class="row au">+${list.length-16} more outlets</div>`:'';
  return `<details class="cov"><summary>📰 Coverage · ${list.length} outlets<span class="chev">›</span></summary><div class="rows">${rows}${more}</div></details>`;
}

function cardHtml(it){
  const sent=sentOf(it); const s=SENT[sent]; const crit=isCrit(it);
  const brand=it.brand?`<span class="bchip" style="background:${BRAND_COLOR[it.brand]||'#6c7480'}">${esc(it.brand)}</span>`:'';
  const spread=spreadOf(it);
  const spreadBadge=spread>1?`<span class="spread ${sent==='negative'&&spread>=4?'hot':''}" title="${spread} outlets ran this">◱ ${spread} outlets</span>`:'';
  const cat=it.category?`<span class="cat">${esc(String(it.category).replace(/_/g,' '))}</span>`:'';
  const age=ageLabel(it); const ageEl=age?`<span class="age">${esc(age)}</span>`:'';
  const href=it.id?`/api/go?id=${it.id}`:(it.url||'#');
  const by=it.author?`<span class="by">By ${esc(it.author)}</span>`:`<span class="by none">Author —</span>`;
  const due=dueLabel(it); const dueEl=due?`<span class="due ${sent==='negative'?'hot':''}">⧗ ${esc(due)}</span>`:'';
  const fb=it.feedback;
  return `<article class="card ${sent}${crit?' crit':''}" id="item-${it.id}">
    <div class="c-top"><div class="metas">${brand}${spreadBadge}${cat}${ageEl}</div>
      <div class="dots" title="Reach/impact ${it.importance||1}/5">${dots(it.importance)}</div></div>
    <h3 class="headline"><a href="${esc(href)}" target="_blank" rel="noopener">${esc(it.headline)}</a></h3>
    <div class="subrow"><span class="sent ${sent}">${s.label}</span>${by}${dueEl}</div>
    ${it.summary?`<p class="summary">${esc(it.summary)}</p>`:''}
    ${angleHtml(it.pr_angle)}
    ${coverageHtml(it.instances)}
    <div class="foot">
      <button class="btn copy" type="button" onclick="copyBrief(${it.id},this)">⧉ Copy brief</button>
      <button class="fb up" aria-pressed="${fb===1}" title="Useful" onclick="vote(${it.id},1,this)">▲</button>
      <button class="fb down" aria-pressed="${fb===-1}" title="Not useful" onclick="vote(${it.id},-1,this)">▼</button>
      <a class="btn open" href="${esc(href)}" target="_blank" rel="noopener">Open source ↗</a>
    </div></article>`;
}

function actionLine(it){ const m=String(it.pr_angle||'').split(/\r?\n+/).map(l=>l.trim().match(/^action\s*[·:\-–—]\s*(.*)$/i)).find(Boolean); return m?m[1].trim():''; }
async function copyBrief(id,btn){
  const it=ITEMS.find(x=>x.id===id); if(!it) return;
  const s=SENT[sentOf(it)]; const spread=spreadOf(it);
  const head=`${s.tag} ${s.label.toUpperCase()} · ${it.brand||'Market'}${spread>1?` · ${spread} outlets`:''}`;
  const act=actionLine(it);
  const text=[head,it.headline,act?`Action: ${act}`:'',linkOf(it)].filter(Boolean).join('\n');
  try{ await navigator.clipboard.writeText(text); }catch(e){ const t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); try{document.execCommand('copy');}catch(_){} t.remove(); }
  const old=btn.textContent; btn.textContent='✓ Copied'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent=old; btn.classList.remove('copied'); },1500);
}
async function vote(id,val,btn){
  const cur=btn.getAttribute('aria-pressed')==='true'; const next=cur?null:val;
  const card=btn.closest('.card'); card.querySelectorAll('.fb').forEach(b=>b.setAttribute('aria-pressed','false'));
  if(next!==null) btn.setAttribute('aria-pressed','true');
  const it=ITEMS.find(x=>x.id===id); if(it) it.feedback=next;
  try{ await fetch(`/api/items?t=${encodeURIComponent(token)}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,feedback:next===null?0:next})}); }catch(e){}
}

function pass(it){ if(fBrand!=='all'&&(it.brand||'')!==fBrand) return false; if(fSent!=='all'&&sentOf(it)!==fSent) return false; return true; }
function render(){
  buildPulse(); buildSpotlight();
  const shown=ITEMS.filter(pass).sort((a,b)=>{ const rank=s=>s==='negative'?0:s==='neutral'?1:2; return rank(sentOf(a))-rank(sentOf(b))||(b.importance||0)-(a.importance||0)||spreadOf(b)-spreadOf(a)||new Date(b.published_at||b.seen_at||0)-new Date(a.published_at||a.seen_at||0); });
  const neg=ITEMS.filter(i=>sentOf(i)==='negative').length;
  const brandNote=fBrand==='all'?'':` · <b>${esc(fBrand)}</b>`;
  $('#status').innerHTML=`<span><b>${ITEMS.length}</b> tracked</span><span class="sep">·</span><span class="neg">${neg} negative</span><span class="sep">·</span><span>${shown.length} shown${brandNote}</span>`;
  const list=$('#list');
  if(!shown.length){ list.innerHTML=`<div class="empty">Nothing matches this filter.<br>Clear the brand or widen the time window.</div>`; return; }
  const SEC=[['negative','Needs a response','#e60000'],['positive','Wins to amplify','#0f9d58'],['neutral','Market & noted','#5b6675']];
  let html='';
  for(const [key,label,color] of SEC){ const rows=shown.filter(i=>sentOf(i)===key); if(!rows.length) continue;
    html+=`<div class="sechead"><span class="tick" style="background:${color}"></span><span class="lab">${label}</span><span class="n" style="background:${color}">${rows.length}</span></div>`;
    html+=rows.map(cardHtml).join(''); }
  list.innerHTML=html; stagger(list); animateBars(list);
  if(location.hash){ const el=document.getElementById(location.hash.slice(1)); if(el) el.scrollIntoView(); }
}

function syncControls(){
  const p=$('#pulse'); const h=p.querySelector('.hero'); if(h) h.setAttribute('aria-pressed',String(fBrand==='Vodafone'));
  p.querySelectorAll('.tile').forEach(c=>c.setAttribute('aria-pressed',String(c.dataset.b===fBrand)));
  $('#sentRow').querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed',String(c.dataset.v===fSent)));
}
function buildFilters(){
  const sent=$('#sentRow');
  const opts=[['all','All'],['negative','⚠ Needs response'],['positive','Wins'],['neutral','Market']];
  sent.innerHTML=`<span class="flabel">Show</span>`+opts.map(([v,l])=>`<button class="chip ${v==='negative'?'alert':''}" type="button" data-v="${v}" aria-pressed="${fSent===v}">${l}</button>`).join('');
  sent.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ fSent=c.dataset.v; syncControls(); render(); });
  const win=$('#winRow');
  const wopts=[['1','Today'],['2','48 hours'],['7','Week'],['30','Month']];
  win.innerHTML=`<span class="flabel">Since</span>`+wopts.map(([v,l])=>`<button class="chip" type="button" data-v="${v}" aria-pressed="${String(fWin)===v}">${l}</button>`).join('');
  win.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ fWin=Number(c.dataset.v); localStorage.setItem('pr_win',c.dataset.v); win.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed',String(x.dataset.v===c.dataset.v))); load(); });
  $('#bar2').hidden=false;
}

async function load(){
  if(!token){ $('#list').innerHTML=`<div class="gate">This board is private.<br>Open it with your access link: <code>?t=YOUR_TOKEN</code></div>`; return; }
  try{
    const r=await fetch(`/api/items?t=${encodeURIComponent(token)}&days=${fWin}`);
    if(r.status===401){ $('#list').innerHTML=`<div class="gate">That access link was rejected.<br>Check the token and open the board again.</div>`; return; }
    ITEMS=await r.json(); if(!Array.isArray(ITEMS)) ITEMS=[]; render();
  }catch(e){ $('#list').innerHTML=`<div class="empty">Couldn't load the board.<br>${esc(e.message||e)}</div>`; }
}

buildFilters();
load();
</script>
</body>
</html>
