<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PR Radar — Brand &amp; Reputation</title>
<meta name="description" content="Daily brand &amp; reputation monitor for Vodafone Egypt — Vodafone, Orange, WE and e&amp; in the Egyptian mobile market, with sentiment, author and coverage spread.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#f1f2f5">
<style>
  :root{
    --red:#e60000; --red-deep:#b60009; --red-glow:rgba(230,0,0,.28);
    --bg:#f1f2f5; --card:#ffffff; --raise:#f6f7f9;
    --ink:#16191f; --ink-2:#3b434e; --muted:#6c7480; --faint:#9aa2ad; --hair:#e7e9ee; --hair-2:#eef0f3;
    --neg:#e60000; --neg-bg:#fff2f0; --neg-line:#ffd4cf;
    --pos:#0f9d58; --pos-bg:#edfaf1; --pos-line:#c3e9d1;
    --neu:#5b6675; --neu-bg:#f0f3f7; --neu-line:#e0e6ec;
    --amber:#d97706;
    --dot-empty:#dfe3e8; --seg-neu:#d3dae1; --seg-empty:#e7e9ee;
    --topbg:rgba(255,255,255,.82); --barbg:rgba(241,242,245,.9); --markbg:var(--ink); --skel:#e7e9ee; --skel-hi:#f3f5f7;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --mh:56px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{color:var(--red)}
  .wrap{max-width:840px;margin:0 auto;min-height:100vh}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:8px}

  /* ── header ── */
  .top{position:sticky;top:0;z-index:40;height:var(--mh);display:flex;align-items:center;gap:11px;padding:0 16px;
       background:var(--topbg);backdrop-filter:blur(16px);border-bottom:1px solid var(--hair)}
  .mark{position:relative;flex:none;width:34px;height:34px;border-radius:11px;background:var(--markbg);overflow:hidden;
        display:grid;place-items:center}
  .mark .sweep{position:absolute;inset:-40%;background:conic-gradient(from 0deg,transparent 300deg,rgba(230,0,0,.7) 358deg,#fff 360deg);
               animation:sweep 3.6s linear infinite}
  .mark .glyph{position:relative;font-weight:800;font-size:13px;color:#fff;letter-spacing:-.02em}
  @keyframes sweep{to{transform:rotate(360deg)}}
  .ttl{flex:1;min-width:0;overflow:hidden}
  .ttl .h1{font-size:16px;font-weight:800;letter-spacing:-.02em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ttl .sub{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trends{flex:none;display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;color:var(--red);
          text-decoration:none;background:#fff;border:1.5px solid var(--red);border-radius:9px;padding:7px 12px;white-space:nowrap;
          box-shadow:0 1px 6px -2px var(--red-glow)}
  .trends:hover{background:var(--red);color:#fff}
  .trends .tic{font-size:12px;line-height:1}
  .clock{flex:none;text-align:right;background:var(--raise);border:1px solid var(--hair);border-radius:9px;padding:5px 9px}
  .clock .t{font-family:var(--mono);font-size:12px;font-weight:700;line-height:1.1}
  .clock .d{font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.08em}
  .account{flex:none;display:flex;align-items:center;gap:8px;min-width:0}
  .account .who{font-size:11px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .account .signout,.account .acctlink{cursor:pointer;text-decoration:none;border:1px solid var(--hair);background:var(--raise);
                    color:var(--ink-2);font-size:11px;border-radius:8px;padding:5px 9px;font-weight:600;white-space:nowrap}
  .account .signout:hover,.account .acctlink:hover{border-color:var(--faint)}
  .account .acctlink.guide{width:28px;height:28px;padding:0;border-radius:50%;display:grid;place-items:center;font-weight:800}
  @media (max-width:560px){
    .account .who,.account .acctlink.pw{display:none}
    .top .clock,.ttl .sub{display:none}   /* declutter the header row on phones */
    .top{gap:8px;padding:0 12px}
  }
  /* Viewers are read-only — hide the write controls (pins/hide/votes) entirely. */
  body[data-role="viewer"] .fb.pin, body[data-role="viewer"] .fb.hide,
  body[data-role="viewer"] .fb.up, body[data-role="viewer"] .fb.down{ display:none }

  /* ── spotlight ── */
  .spotlight{display:none;align-items:center;gap:11px;cursor:pointer;margin:12px 16px 0;color:#fff;
             padding:13px 15px;border-radius:15px;line-height:1.35;font-size:13px;
             background:linear-gradient(120deg,#c2000a,#e60000);box-shadow:0 8px 22px -8px var(--red-glow)}
  .spotlight.on{display:flex;animation:rise .5s both}
  .spotlight .pin{flex:none;position:relative;width:9px;height:9px}
  .spotlight .pin::before,.spotlight .pin::after{content:"";position:absolute;inset:0;border-radius:50%;background:#fff}
  .spotlight .pin::after{animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{0%{transform:scale(1);opacity:.7}80%,100%{transform:scale(2.6);opacity:0}}
  .spotlight .txt{flex:1;min-width:0}
  .spotlight .lab{font-size:9px;font-weight:800;letter-spacing:.16em;opacity:.85;text-transform:uppercase}
  .spotlight b{font-weight:800}
  .spotlight .go{flex:none;font-size:11px;font-weight:700;background:rgba(255,255,255,.22);padding:6px 10px;border-radius:9px;white-space:nowrap}

  /* ── pulse: Vodafone hero + competitor tiles ── */
  .pulse[hidden]{display:none}
  .pulse{padding:14px 16px 4px}
  .pulse .ph{font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--muted);margin:0 2px 9px;
             display:flex;align-items:center;gap:7px}
  .pulse .ph .dt{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 0 3px var(--pos-bg)}
  .hero{position:relative;display:flex;align-items:center;gap:14px;cursor:pointer;background:var(--card);
        border:1px solid var(--hair);border-radius:18px;padding:16px 17px;box-shadow:0 2px 10px -6px rgba(20,23,28,.15);
        transition:transform .12s,box-shadow .2s;animation:rise .5s both}
  .hero:active{transform:scale(.99)}
  .hero[aria-pressed=true]{border-color:var(--red);box-shadow:0 0 0 2px var(--red-glow)}
  .hero.alert{background:linear-gradient(180deg,var(--neg-bg),var(--card) 60%)}
  .hero.alert::after{content:"";position:absolute;inset:-1px;border-radius:18px;pointer-events:none;
                     box-shadow:0 0 0 0 var(--red-glow);animation:ring 2.4s ease-out infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(230,0,0,.32)}70%,100%{box-shadow:0 0 0 12px rgba(230,0,0,0)}}
  .hero .hlogo{flex:none;width:44px;height:44px;border-radius:13px;background:var(--red);display:grid;place-items:center;
               color:#fff;font-weight:800;font-size:20px;box-shadow:0 6px 16px -6px var(--red-glow)}
  .hero .hbody{flex:1;min-width:0}
  .hero .hb1{display:flex;align-items:baseline;gap:8px}
  .hero .hbrand{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .hero .hpill{font-size:10px;font-weight:800;letter-spacing:.04em;padding:3px 9px;border-radius:20px;text-transform:uppercase}
  .hero .hbig{display:flex;align-items:baseline;gap:6px;margin-top:7px}
  .hero .hn{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .hero .hu{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.15}
  .hbar{display:flex;height:7px;border-radius:5px;overflow:hidden;margin-top:11px;background:var(--hair-2)}
  .hbar i{display:block;height:100%;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:9px}
  .tile{cursor:pointer;background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:11px 12px;text-align:left;
        font-family:var(--sans);transition:transform .12s,border-color .15s;animation:rise .5s both}
  .tile:active{transform:scale(.98)}
  .tile[aria-pressed=true]{border-color:var(--tc);box-shadow:0 0 0 2px color-mix(in srgb,var(--tc) 22%,transparent)}
  .tile .tt{display:flex;align-items:center;gap:6px}
  .tile .tdot{width:8px;height:8px;border-radius:3px;flex:none}
  .tile .tb{font-size:12.5px;font-weight:800}
  .tile .tbar{display:flex;height:5px;border-radius:4px;overflow:hidden;margin-top:9px;background:var(--hair-2)}
  .tile .tbar i{display:block;height:100%;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .tile .tc-cnt{margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--faint)}
  .tile .tc-cnt b{color:var(--ink-2)} .tile .tc-cnt .neg{color:var(--neg);font-weight:700}

  /* ── filter bar ── */
  .bar2[hidden]{display:none}
  .bar2{position:sticky;top:var(--mh);z-index:30;background:var(--barbg);backdrop-filter:blur(12px);
        border-bottom:1px solid var(--hair);padding:11px 16px 10px;margin-top:12px}
  .status{font-size:12px;color:var(--muted);margin-bottom:9px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .status b{color:var(--ink);font-weight:700} .status .neg{color:var(--neg);font-weight:700} .status .sep{color:var(--faint)}
  .frow{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
  .frow::-webkit-scrollbar{display:none}
  .frow+.frow{margin-top:7px}
  .dfilter{display:none;align-items:center;justify-content:space-between;gap:10px;margin:12px 16px 2px;padding:9px 13px;
           background:var(--neg-bg);border:1px solid var(--neg-line);border-radius:12px;font-size:13px;color:var(--ink-2)}
  .dfilter.on{display:flex}
  .dfilter .dk{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-right:2px}
  .dfilter .dfx{flex:none;cursor:pointer;border:1px solid var(--neg-line);background:#fff;color:var(--red-deep);font-size:11.5px;font-weight:700;border-radius:9px;padding:6px 11px;white-space:nowrap}
  .dfilter .dfx:hover{background:var(--red);color:#fff;border-color:var(--red)}
  .flabel{flex:none;align-self:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding-right:2px}
  .chip{flex:none;cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--ink-2);
        font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:11px;white-space:nowrap;transition:all .12s}
  .chip:hover{border-color:var(--faint)}
  .chip[aria-pressed=true]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.alert[aria-pressed=true]{background:var(--red);border-color:var(--red);box-shadow:0 6px 16px -8px var(--red-glow)}

  /* ── list ── */
  .list{padding:10px 16px 76px}
  .empty,.gate{text-align:center;color:var(--muted);padding:64px 26px;font-size:14px;line-height:1.7}
  .gate code{background:var(--card);border:1px solid var(--hair);padding:2px 8px;border-radius:6px;color:var(--ink);font-family:var(--mono)}
  .sechead{display:flex;align-items:center;gap:9px;padding:20px 2px 9px}
  .sechead .tick{width:10px;height:10px;border-radius:4px;flex:none}
  .sechead .lab{font-size:13px;font-weight:800;letter-spacing:-.01em}
  .sechead .n{font-size:11px;font-weight:700;color:#fff;background:var(--faint);border-radius:20px;padding:1px 8px;min-width:20px;text-align:center}

  /* ── card ── */
  .card{position:relative;background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:16px 17px;margin:11px 0;
        box-shadow:0 2px 12px -8px rgba(20,23,28,.18);animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card.negative{background:linear-gradient(180deg,var(--neg-bg),var(--card) 42%);border-color:var(--neg-line)}
  .card.positive{border-color:var(--pos-line)}
  .card.crit::before{content:"";position:absolute;inset:-1px;border-radius:18px;pointer-events:none;animation:ring 2.6s ease-out infinite}
  .c-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .metas{display:flex;flex-wrap:wrap;align-items:center;gap:7px;font-size:11px;color:var(--faint)}
  .bchip{color:#fff;font-weight:800;padding:3px 9px;border-radius:7px;font-size:10px;letter-spacing:.02em}
  .spread{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-weight:700;font-size:10px;
          padding:3px 8px;border-radius:7px;background:var(--raise);color:var(--ink-2);border:1px solid var(--hair)}
  .spread.hot{background:var(--neg);color:#fff;border-color:var(--neg)}
  .cat{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.03em;text-transform:uppercase}
  .age{color:var(--faint)}
  .dots{white-space:nowrap;letter-spacing:2px;font-size:11px;flex:none}
  .dots .dlab{letter-spacing:.05em;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--faint);margin-right:6px;vertical-align:middle}
  .headline{font-size:18px;font-weight:750;line-height:1.32;margin:11px 0 0;letter-spacing:-.02em;text-wrap:pretty}
  .headline a{color:var(--ink);text-decoration:none}
  .headline a:hover{color:var(--red-deep)}
  .subrow{margin-top:10px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12px}
  .sent{font-size:10px;font-weight:800;letter-spacing:.04em;padding:4px 10px;border-radius:20px}
  .sent.negative{background:var(--neg-bg);color:var(--red-deep);box-shadow:inset 0 0 0 1px var(--neg-line)}
  .sent.positive{background:var(--pos-bg);color:var(--pos);box-shadow:inset 0 0 0 1px var(--pos-line)}
  .sent.neutral{background:var(--neu-bg);color:var(--neu);box-shadow:inset 0 0 0 1px var(--neu-line)}
  .by{color:var(--ink-2);font-weight:500} .by.none{color:var(--faint)}
  .due{margin-left:auto;font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;
       background:#fff5e6;color:var(--amber);box-shadow:inset 0 0 0 1px #f5dcb0}
  .due.hot{background:var(--neg-bg);color:var(--red-deep);box-shadow:inset 0 0 0 1px var(--neg-line)}
  .summary{font-size:14px;line-height:1.58;color:var(--ink-2);margin-top:10px}

  /* ── bidi: mixed Arabic/English text ──
     Headlines and summaries freely mix Arabic with Latin brand tokens
     ("Vodafone Cash", "5G", numbers). With the page's LTR base direction the
     Unicode bidi algorithm scrambles their ordering and drops punctuation to
     the wrong end. unicode-bidi:plaintext makes each block take its base
     direction from its OWN first strong character (like dir="auto"), and
     text-align:start aligns it to the matching side — Arabic headlines read
     right-to-left from the right, English ones exactly as before. */
  .headline,.summary,.angle td:not(.k),.angle .plain,.cov .row,#spotlightText{
    unicode-bidi:plaintext;text-align:start}
  .by{unicode-bidi:plaintext}

  .angle{margin-top:13px;border-radius:14px;padding:13px 14px;background:var(--neu-bg)}
  .card.negative .angle{background:var(--neg-bg);box-shadow:inset 0 0 0 1px var(--neg-line)}
  .card.positive .angle{background:var(--pos-bg);box-shadow:inset 0 0 0 1px var(--pos-line)}
  .angle .lab{font-size:9.5px;font-weight:800;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
  .angle table{border-collapse:collapse;width:100%}
  .angle td{vertical-align:top;padding:4px 0;font-size:13px;line-height:1.5;color:var(--ink-2)}
  .angle td.k{width:74px;padding-right:12px;font-size:9.5px;font-weight:800;letter-spacing:.06em;color:var(--red);text-transform:uppercase;white-space:nowrap;padding-top:5px}
  .angle .plain{font-size:13px;line-height:1.5;color:var(--ink-2)}

  .cov{margin-top:12px}
  .cov summary{cursor:pointer;list-style:none;font-size:11.5px;font-weight:700;color:var(--ink-2);padding:8px 12px;
               background:var(--raise);border:1px solid var(--hair);border-radius:11px;display:flex;align-items:center;gap:7px}
  .cov summary::-webkit-details-marker{display:none}
  .cov summary .chev{margin-left:auto;color:var(--faint);transition:transform .2s}
  .cov[open] summary .chev{transform:rotate(90deg)}
  .cov[open] summary{border-radius:11px 11px 0 0;border-bottom:none}
  .cov .rows{background:var(--card);border:1px solid var(--hair);border-top:none;border-radius:0 0 11px 11px;padding:9px 13px}
  .cov .row{font-size:12px;line-height:1.65;color:var(--ink-2);padding:2px 0}
  .cov .row a{color:var(--ink-2);text-decoration:none;font-weight:600}
  .cov .row a:hover{color:var(--red)}
  .cov .row .au{color:var(--faint)}

  .foot{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--hair-2)}
  .btn{cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--ink-2);font-family:var(--sans);
       font-size:12.5px;font-weight:700;padding:9px 13px;border-radius:11px;line-height:1;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
  .btn:hover{border-color:var(--faint)}
  .btn.copied{background:var(--pos);color:#fff;border-color:var(--pos)}
  .btn.open{margin-left:auto;color:var(--red);border-color:var(--neg-line);background:var(--neg-bg)}
  .btn.open:hover{background:#ffe7e3}
  .fb{cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--muted);font-size:13px;
      width:38px;height:36px;border-radius:11px;line-height:1;font-family:var(--sans)}
  .fb:hover{border-color:var(--faint)}
  .fb.up[aria-pressed=true]{background:var(--pos);color:#fff;border-color:var(--pos)}
  .fb.down[aria-pressed=true]{background:var(--red);color:#fff;border-color:var(--red)}

  /* ── team_share pin / hide (admin) ── */
  .fb.pin[aria-pressed=true]{background:var(--amber);color:#fff;border-color:var(--amber)}
  .fb.hide[aria-pressed=true]{background:var(--ink-2);color:#fff;border-color:var(--ink-2)}
  .card.pinned{box-shadow:0 2px 12px -8px rgba(20,23,28,.18),inset 3px 0 0 0 var(--amber)}
  .card.hidden{opacity:.5}
  .card.hidden:hover{opacity:1}
  .pinmark{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:2px 7px;border-radius:7px;white-space:nowrap}
  .pinmark.pin{background:#fff5e6;color:var(--amber);box-shadow:inset 0 0 0 1px #f5dcb0}
  .pinmark.hide{background:var(--hair-2);color:var(--muted);box-shadow:inset 0 0 0 1px var(--hair)}

  /* ── skeleton loading ── */
  .skel-wrap{padding:14px 16px}
  .skel{background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:16px 17px;margin:11px 0}
  .skel .ln{height:12px;border-radius:6px;background:linear-gradient(90deg,var(--skel) 25%,var(--skel-hi) 37%,var(--skel) 63%);
            background-size:400% 100%;animation:shimmer 1.4s ease infinite}
  .skel .ln.w40{width:40%}.skel .ln.w70{width:70%}.skel .ln.w90{width:90%}.skel .ln.tall{height:20px;margin:12px 0}
  .skel .ln+.ln{margin-top:9px}
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

  /* ── share button (card + pulse) ── */
  .btn.share{color:var(--ink-2)}
  .shbtn{cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--muted);border-radius:9px;
         font-size:12px;font-weight:700;padding:6px 10px;line-height:1;display:inline-flex;align-items:center;gap:5px}
  .shbtn:hover{border-color:var(--faint);color:var(--ink-2)}
  .pulse .ph .shbtn{margin-left:auto}
  /* snapshot preview modal */
  .snap{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:20px;
        background:rgba(8,10,13,.72);backdrop-filter:blur(4px)}
  .snap.on{display:flex}
  .snap .box{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:14px;max-width:min(92vw,440px);width:100%}
  .snap img{width:100%;border-radius:10px;display:block;box-shadow:0 8px 30px -12px rgba(0,0,0,.5)}
  .snap .acts{display:flex;gap:8px;margin-top:12px}
  .snap .acts button{flex:1;cursor:pointer;border:0;border-radius:10px;padding:11px;font-family:var(--sans);font-size:13px;font-weight:700}
  .snap .acts .dl{background:var(--red);color:#fff}
  .snap .acts .cl{background:var(--raise);color:var(--ink-2);border:1px solid var(--hair)}

  /* ── classifier confidence cue (subtle 3-bar meter) ── */
  .conf{display:inline-flex;align-items:center;gap:4px}
  .cplab{font-size:10px;color:var(--muted);white-space:nowrap}
  .conf.low .cplab{color:var(--amber);font-weight:700}
  .cpip{display:inline-flex;align-items:flex-end;gap:1.5px;height:9px}
  .cpip i{width:2.5px;border-radius:1px;background:var(--hair-2)}
  .cpip i:nth-child(1){height:4px}.cpip i:nth-child(2){height:6px}.cpip i:nth-child(3){height:9px}
  .cpip i.on{background:var(--faint)}
  .conf.low .cpip i.on{background:var(--amber)}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="mark" aria-hidden="true"><span class="sweep"></span><span class="glyph">PR</span></div>
    <div class="ttl"><div class="h1">PR Radar</div><div class="sub">Brand &amp; Reputation · Vodafone Egypt</div></div>
    <a class="trends" id="trendsLink" href="/stats" title="Trends — charts: share of voice &amp; sentiment over time"><span class="tic">📈</span> Trends</a>
    <div class="account" id="account"></div>
    <div class="clock"><div class="t" id="clockTime">—</div><div class="d" id="clockDate">—</div></div>
  </header>

  <div class="snap" id="snap"><div class="box">
    <img id="snapImg" alt="Shareable snapshot">
    <div class="acts"><button class="dl" id="snapDl" type="button">↓ Save image</button><button class="cl" id="snapCl" type="button">Close</button></div>
  </div></div>

  <button class="spotlight" id="spotlight" type="button">
    <span class="pin"></span>
    <span class="txt"><span class="lab">Needs eyes now</span><br><span id="spotlightText"></span></span>
    <span class="go">Jump ↓</span>
  </button>

  <div class="pulse" id="pulse" hidden></div>

  <div class="bar2" id="bar2" hidden>
    <div class="status" id="status"></div>
    <div class="frow" id="sentRow"></div>
    <div class="frow" id="winRow"></div>
  </div>

  <div class="dfilter" id="dfilter" hidden></div>
  <main class="list" id="list"><div class="empty">Loading the board…</div></main>
</div>

<script>
const $ = (s, r=document) => r.querySelector(s);
const esc = (s) => String(s==null?'':s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;

const params = new URLSearchParams(location.search);
const token = '';   // ?t= board tokens retired (Task 18) — auth is the sign-in session only

// ── session (Task 16: magic-link auth) ──────────────────────────────────────
// A magic-link redirect hands the Supabase session back in the URL fragment
// (#access_token=…&refresh_token=…). Capture it, stash it, and scrub the URL so
// the tokens don't linger in history. Signed-in calls send a Bearer token; the
// legacy ?t=<token> board link still works as a fallback.
let session = (()=>{ try{ return JSON.parse(localStorage.getItem('pr_session')||'null'); }catch(e){ return null; } })();
(function captureHash(){
  if(!location.hash) return;
  const h=new URLSearchParams(location.hash.slice(1));
  const at=h.get('access_token');
  if(at){ session={access_token:at, refresh_token:h.get('refresh_token')||''};
    try{ localStorage.setItem('pr_session',JSON.stringify(session)); }catch(e){}
    history.replaceState(null,'',location.pathname+location.search); }
})();
function saveSession(s){ session=s; try{ s?localStorage.setItem('pr_session',JSON.stringify(s)):localStorage.removeItem('pr_session'); }catch(e){} }
function signOut(){ saveSession(null); localStorage.removeItem('pr_token'); location.href='/login'; }
const authed = () => !!(session || token);
$('#trendsLink').href = session ? '/stats' : (token?`/stats?t=${encodeURIComponent(token)}`:'/stats');

let _cfg=null;
async function authConfig(){ if(_cfg) return _cfg; try{ _cfg=await (await fetch('/api/auth?view=config')).json(); }catch(e){ _cfg={}; } return _cfg; }
async function refreshSession(){
  if(!session?.refresh_token) return false;
  const c=await authConfig(); if(!c.supabaseUrl||!c.anonKey) return false;
  try{
    const r=await fetch(`${c.supabaseUrl}/auth/v1/token?grant_type=refresh_token`,{method:'POST',
      headers:{apikey:c.anonKey,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:session.refresh_token})});
    if(!r.ok) return false; const d=await r.json(); if(!d.access_token) return false;
    saveSession({access_token:d.access_token, refresh_token:d.refresh_token||session.refresh_token}); return true;
  }catch(e){ return false; }
}
function authURL(path){ if(session) return path; return token?`${path}${path.includes('?')?'&':'?'}t=${encodeURIComponent(token)}`:path; }
// Fetch an /api path with auth; on a 401 try one silent session refresh.
async function afetch(path, opts={}, _retried){
  const o={...opts, headers:{...(opts.headers||{})}};
  if(session) o.headers.Authorization=`Bearer ${session.access_token}`;
  const r=await fetch(authURL(path), o);
  if(r.status===401 && session && !_retried && await refreshSession()) return afetch(path, opts, true);
  return r;
}
// Identity (email + role). Viewers are read-only, so we hide write controls.
let ME=null;
async function loadMe(){
  try{ const r=await afetch('/api/auth?view=me'); if(r.ok){ ME=await r.json(); document.body.dataset.role=ME.role||''; renderAccount(); } }catch(e){}
}
function renderAccount(){
  const el=$('#account'); if(!el) return;
  let h=`<a class="acctlink guide" href="/guide" title="How it works — a quick guide">?</a>`;
  if(ME&&ME.role==='admin'){ h+=`<a class="acctlink" href="/admin" title="Admin panel — users, subscribers, feedback, audit">⚙ Admin</a>`; }
  if(ME&&ME.email){
    h+=`<a class="acctlink pw" href="/account" title="Change your password">Password</a>`;
    h+=`<span class="who" title="Signed in as ${esc(ME.role)}">${esc(ME.email)}</span>`;
    h+=`<button class="signout" type="button" onclick="signOut()">Sign out</button>`;
  } else if(token){
    h+=`<button class="signout" type="button" onclick="signOut()">Sign out</button>`;
  }
  el.innerHTML=h;
}

const BRANDS = ['Vodafone','Orange','WE','e&'];
const BRAND_COLOR = { Vodafone:'#e60000', Orange:'#ff7900', WE:'#7b1fa2', 'e&':'#00857b', market:'#6c7480' };
const SENT = {
  negative:{ label:'Negative', color:'#e60000', tag:'⚠' },
  positive:{ label:'Positive', color:'#0f9d58', tag:'✓' },
  neutral :{ label:'Neutral',  color:'#5b6675', tag:'•' },
};
const IMP = {5:'#e60000',4:'#f27100',3:'#e2a900',2:'#3a7ac2',1:'#9aa2ad'};

let ITEMS=[]; let fBrand='all', fSent='all', fWin=Number(localStorage.getItem('pr_win'))||2, fPin='all', fLowConf='all';
// Deep-link filters from the Trends page: click a category / outlet / journalist
// there to land on the board showing exactly those cards.
let fCat=params.get('cat')||'', fOutlet=params.get('outlet')||'', fAuthor=params.get('author')||'';
if(params.get('brand')) fBrand=params.get('brand');
if(params.get('sent')) fSent=params.get('sent');
{ const w=Number(params.get('win')); if([1,2,7,30].includes(w)) fWin=w; }
const itemHasOutlet=(it,o)=>Array.isArray(it.instances)&&it.instances.some(x=>x&&x.outlet===o);
const itemHasAuthor=(it,a)=>(it.author===a)||(Array.isArray(it.instances)&&it.instances.some(x=>x&&x.author===a));
function deepFilter(){ if(fCat) return{kind:'Category',val:String(fCat).replace(/_/g,' ')}; if(fOutlet) return{kind:'Outlet',val:fOutlet}; if(fAuthor) return{kind:'Journalist',val:fAuthor}; return null; }
function clearDeepFilter(){ fCat=fOutlet=fAuthor=''; try{ const u=new URL(location.href); ['cat','outlet','author'].forEach(k=>u.searchParams.delete(k)); history.replaceState(null,'',u.pathname+(u.search||'')+u.hash); }catch(e){} render(); }

// team_share pins are SERVER state (shared with the team view), but pinned
// items can be older than the current window — so we also remember pinned ids
// locally and fetch them by id for the Pinned filter (the API supports ?ids=).
function pinnedSet(){ try{ return new Set(JSON.parse(localStorage.getItem('pr_pinned')||'[]').map(Number)); }catch(e){ return new Set(); } }
function savePinned(set){ try{ localStorage.setItem('pr_pinned',JSON.stringify([...set])); }catch(e){} }
const isPinned=it=>it.team_share===true||pinnedSet().has(it.id);

function clock(){
  const now=new Date();
  $('#clockDate').textContent=now.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',timeZone:'Africa/Cairo'}).toUpperCase();
  $('#clockTime').textContent=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Africa/Cairo'})+' CAI';
}
clock(); setInterval(clock,30000);

const sentOf = it => SENT[it.sentiment]?it.sentiment:'neutral';
// Section lane (what WE do about it) — distinct from the item's own sentiment.
// The action lanes ("Needs a response", "Wins to amplify") are Vodafone-only:
// a competitor's story — good or bad — is market intel, so it drops to the
// "Market & noted" lane rather than reading as our win or our fire to fight.
// sentOf() is untouched, so each card keeps its true sentiment badge.
const laneOf = it => ((it.brand||'')==='Vodafone') ? sentOf(it) : 'neutral';
const spreadOf = it => Array.isArray(it.instances)?it.instances.filter(x=>x&&(x.outlet||x.url)).length:0;
const linkOf = it => it.resolved_url || it.url || (it.id?`/api/go?id=${it.id}`:'#');
// Critical (red ring / "needs eyes") is a Vodafone-action signal — a competitor's
// negative story is market intel, not our crisis, so it never trips crit.
const isCrit = it => sentOf(it)==='negative' && it.brand==='Vodafone' && (it.importance||0)>=4;

function dots(imp){ const n=Math.max(1,Math.min(5,imp||1)); let o=''; for(let i=1;i<=5;i++) o+=`<span style="color:${i<=n?IMP[n]:'var(--dot-empty)'}">&#9679;</span>`; return o; }
// Subtle provenance cue: how confident the classifier was in this read. 3-bar
// meter, amber when low (<50%) so an uncertain classification is worth a second
// look. Hidden when confidence wasn't stored.
const confTier=c=>c>=0.75?3:c>=0.5?2:1;
function confPip(it){ const c=it.confidence; if(c==null) return ''; const t=confTier(c),low=c<0.5; const pct=Math.round(c*100);
  return `<span class="conf ${low?'low':''}" title="How sure the classifier was about this read${low?' — low, double-check':''}">`
    +`<span class="cpip">${[1,2,3].map(n=>`<i class="${n<=t?'on':''}"></i>`).join('')}</span>`
    +`<span class="cplab">${pct}% confidence${low?' · low':''}</span></span>`; }
const isLowConf=it=>it.confidence!=null&&it.confidence<0.5;
function ageLabel(it){ const t=it.published_at||it.seen_at; if(!t) return ''; const h=Math.max(0,(Date.now()-new Date(t).getTime())/36e5); if(h<1) return 'just now'; if(h<24) return Math.round(h)+'h ago'; return Math.round(h/24)+'d ago'; }
function dueLabel(it){ if(!it.deadline) return ''; const h=(new Date(it.deadline)-Date.now())/36e5; if(h<0) return 'overdue'; if(h<1) return 'due <1h'; if(h<48) return 'due '+Math.round(h)+'h'; return 'due '+Math.round(h/24)+'d'; }
function animateBars(root=document){ const els=root.querySelectorAll('[data-w]'); if(RM){els.forEach(i=>i.style.width=i.dataset.w);return;} requestAnimationFrame(()=>els.forEach(i=>i.style.width=i.dataset.w)); }
function countUp(el,to){ if(!el) return; if(RM||to<=0){el.textContent=to;return;} let s=null; const step=t=>{if(!s)s=t;const p=Math.min(1,(t-s)/650);el.textContent=Math.round(p*to);if(p<1)requestAnimationFrame(step);}; requestAnimationFrame(step); }
function stagger(root){ if(RM) return; root.querySelectorAll('.card').forEach((c,i)=>c.style.animationDelay=Math.min(i*45,400)+'ms'); }

/* ── pulse: Vodafone hero + competitor tiles ── */
function buildPulse(){
  const V='Vodafone'; const vr=ITEMS.filter(i=>(i.brand||'')===V);
  const vneg=vr.filter(i=>sentOf(i)==='negative').length, vpos=vr.filter(i=>sentOf(i)==='positive').length, vneu=vr.length-vneg-vpos;
  const vsev=Math.max(0,...vr.filter(i=>sentOf(i)==='negative').map(i=>i.importance||0));
  let pill,pillbg,pillc,alert=false;
  if(vsev>=4){pill='Alert';pillbg='var(--neg-bg)';pillc='var(--red-deep)';alert=true;}
  else if(vneg>0){pill='Watch';pillbg='#fff5e6';pillc='var(--amber)';}
  else {pill='Clear';pillbg='var(--pos-bg)';pillc='var(--pos)';}
  const vtot=vr.length||1;
  const vseg=(n,c)=>n?`<i data-w="${(n/vtot*100).toFixed(1)}%" style="background:${c}"></i>`:'';
  const vbar=vr.length?vseg(vneg,'#e60000')+vseg(vneu,'var(--seg-neu)')+vseg(vpos,'#0f9d58'):`<i data-w="100%" style="background:var(--seg-empty)"></i>`;

  const tiles=BRANDS.filter(b=>b!==V).map(b=>{
    const rows=ITEMS.filter(i=>(i.brand||'')===b);
    const neg=rows.filter(i=>sentOf(i)==='negative').length, pos=rows.filter(i=>sentOf(i)==='positive').length, neu=rows.length-neg-pos, tot=rows.length||1;
    const seg=(n,c)=>n?`<i data-w="${(n/tot*100).toFixed(1)}%" style="background:${c}"></i>`:'';
    const bar=rows.length?seg(neg,'#e60000')+seg(neu,'var(--seg-neu)')+seg(pos,'#0f9d58'):`<i data-w="100%" style="background:var(--seg-empty)"></i>`;
    const cnt=rows.length?`<span class="${neg?'neg':''}"><b>${neg}</b></span> neg · ${rows.length}`:'no items';
    return `<button class="tile" type="button" data-b="${esc(b)}" aria-pressed="${fBrand===b}" style="--tc:${BRAND_COLOR[b]}">
      <span class="tt"><span class="tdot" style="background:${BRAND_COLOR[b]}"></span><span class="tb">${esc(b)}</span></span>
      <span class="tbar">${bar}</span><span class="tc-cnt">${cnt}</span></button>`;
  }).join('');

  $('#pulse').innerHTML=
    `<div class="ph"><span class="dt"></span>Today’s reputation pulse<button class="shbtn" type="button" onclick="snapshotPulse()" title="Share a branded snapshot">📸 Share</button></div>
     <div class="hero ${alert?'alert':''}" role="button" tabindex="0" data-b="${V}" aria-pressed="${fBrand===V}">
       <div class="hlogo">V</div>
       <div class="hbody">
         <div class="hb1"><span class="hbrand">Vodafone</span><span class="hpill" style="background:${pillbg};color:${pillc}">${pill}</span></div>
         <div class="hbig"><span class="hn" id="vNeg">0</span><span class="hu">negative<br>of ${vr.length} tracked</span></div>
         <div class="hbar">${vbar}</div>
       </div></div>
     <div class="tiles">${tiles}</div>`;
  countUp($('#vNeg'),vneg);
  const hero=$('#pulse .hero');
  const toggleV=()=>{ fBrand=(fBrand===V)?'all':V; syncControls(); render(); };
  hero.onclick=toggleV; hero.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleV();} };
  $('#pulse').querySelectorAll('.tile').forEach(c=>c.onclick=()=>{ fBrand=(fBrand===c.dataset.b)?'all':c.dataset.b; syncControls(); render(); });
  $('#pulse').hidden=false;
  animateBars($('#pulse'));
}

function buildSpotlight(){
  const el=$('#spotlight');
  // "Needs eyes now" is an urgent-action prompt, so it only fires for Vodafone —
  // a competitor's bad news isn't ours to jump on.
  const worst=ITEMS.filter(i=>sentOf(i)==='negative'&&i.brand==='Vodafone').sort((a,b)=>(b.importance||0)-(a.importance||0)||spreadOf(b)-spreadOf(a))[0];
  const spread=worst?spreadOf(worst):0;
  if(worst&&((worst.importance||0)>=4||spread>=4)){
    const where=spread>1?` · ${spread} outlets`:'';
    // <bdi> isolates the headline's direction from the Latin "Brand · N outlets"
    // prefix — otherwise an Arabic headline inherits the span's LTR base and
    // scrambles (5G splits, trailing ! jumps to the wrong end).
    $('#spotlightText').innerHTML=`<b>${esc(worst.brand||'Market')}${where}</b> — <bdi>${esc(worst.headline)}</bdi>`;
    el.classList.add('on');
    el.onclick=()=>{ const c=document.getElementById('item-'+worst.id); if(c){ c.scrollIntoView({behavior:'smooth',block:'center'}); c.style.transition='box-shadow .3s'; c.style.boxShadow='0 0 0 3px var(--red-glow)'; setTimeout(()=>c.style.boxShadow='',1500);} };
  } else el.classList.remove('on');
}

function angleHtml(text){
  const src=String(text||'').trim(); if(!src) return '';
  const lines=[];
  for(const raw of src.split(/\r?\n+/)){ const m=raw.trim().match(/^([A-Za-z][A-Za-z \/&]*?)\s*[·:\-–—]\s*(.*)$/); if(!m) continue; const v=m[2].trim(); if(!v||/^[—–\-·.\s]*$/.test(v)) continue; lines.push([m[1].trim(),v]); }
  const body=lines.length?`<table>${lines.map(([k,v])=>`<tr><td class="k">${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')}</table>`:`<div class="plain">${esc(src)}</div>`;
  return `<div class="angle"><div class="lab">What to do with this</div>${body}</div>`;
}
function coverageHtml(insts){
  const list=Array.isArray(insts)?insts.filter(x=>x&&(x.outlet||x.url)):[]; if(list.length<2) return '';
  const rows=list.slice(0,16).map(x=>{ const name=esc(x.outlet||'—'); const link=x.url?`<a href="${esc(x.url)}" target="_blank" rel="noopener">${name}</a>`:`<span style="font-weight:600">${name}</span>`; const by=x.author?` <span class="au">· ${esc(x.author)}</span>`:''; return `<div class="row">${link}${by}</div>`; }).join('');
  const more=list.length>16?`<div class="row au">+${list.length-16} more outlets</div>`:'';
  return `<details class="cov"><summary>📰 Coverage · ${list.length} outlets<span class="chev">›</span></summary><div class="rows">${rows}${more}</div></details>`;
}

function cardHtml(it){
  const sent=sentOf(it); const s=SENT[sent]; const crit=isCrit(it);
  const brand=it.brand?`<span class="bchip" style="background:${BRAND_COLOR[it.brand]||'#6c7480'}">${esc(it.brand)}</span>`:'';
  const spread=spreadOf(it);
  const spreadBadge=spread>1?`<span class="spread ${sent==='negative'&&spread>=4?'hot':''}" title="${spread} outlets ran this">◱ ${spread} outlets</span>`:'';
  const cat=it.category?`<span class="cat">${esc(String(it.category).replace(/_/g,' '))}</span>`:'';
  const age=ageLabel(it); const ageEl=age?`<span class="age">${esc(age)}</span>`:'';
  const href=it.id?`/api/go?id=${it.id}`:(it.url||'#');
  const by=it.author?`<span class="by">By ${esc(it.author)}</span>`:`<span class="by none">Author —</span>`;
  const due=dueLabel(it); const dueEl=due?`<span class="due ${sent==='negative'?'hot':''}">⧗ ${esc(due)}</span>`:'';
  const fb=it.feedback;
  const pinned=it.team_share===true, hidden=it.team_share===false;
  const pinMark=pinned?`<span class="pinmark pin" title="Pinned for the team">📌 Pinned</span>`:hidden?`<span class="pinmark hide" title="Hidden from the team view">🙈 Hidden</span>`:'';
  return `<article class="card ${sent}${crit?' crit':''}${pinned?' pinned':''}${hidden?' hidden':''}" id="item-${it.id}">
    <div class="c-top"><div class="metas">${brand}${spreadBadge}${cat}${ageEl}${confPip(it)}${pinMark}</div>
      <div class="dots" title="Reach / impact ${it.importance||1} of 5"><span class="dlab">Reach</span>${dots(it.importance)}</div></div>
    <h3 class="headline"><a href="${esc(href)}" target="_blank" rel="noopener">${esc(it.headline)}</a></h3>
    <div class="subrow"><span class="sent ${sent}">${s.label}</span>${by}${dueEl}</div>
    ${it.summary?`<p class="summary">${esc(it.summary)}</p>`:''}
    ${angleHtml(it.pr_angle)}
    ${coverageHtml(it.instances)}
    <div class="foot">
      <button class="btn copy" type="button" onclick="copyBrief(${it.id},this)">⧉ Copy brief</button>
      <button class="fb share" type="button" title="Share a branded snapshot" onclick="snapshotCard(${it.id})">📸</button>
      <button class="fb pin" aria-pressed="${pinned}" title="Pin for the team" onclick="togglePin(${it.id},'pin',this)">📌</button>
      <button class="fb hide" aria-pressed="${hidden}" title="Hide from the team view" onclick="togglePin(${it.id},'hide',this)">🙈</button>
      <button class="fb up" aria-pressed="${fb===1}" title="Useful" onclick="vote(${it.id},1,this)">▲</button>
      <button class="fb down" aria-pressed="${fb===-1}" title="Not useful" onclick="vote(${it.id},-1,this)">▼</button>
      <a class="btn open" href="${esc(href)}" target="_blank" rel="noopener">Open source ↗</a>
    </div></article>`;
}

function actionLine(it){ const m=String(it.pr_angle||'').split(/\r?\n+/).map(l=>l.trim().match(/^action\s*[·:\-–—]\s*(.*)$/i)).find(Boolean); return m?m[1].trim():''; }
async function copyBrief(id,btn){
  const it=ITEMS.find(x=>x.id===id); if(!it) return;
  const s=SENT[sentOf(it)]; const spread=spreadOf(it);
  const head=`${s.tag} ${s.label.toUpperCase()} · ${it.brand||'Market'}${spread>1?` · ${spread} outlets`:''}`;
  const act=actionLine(it);
  const text=[head,it.headline,act?`Action: ${act}`:'',linkOf(it)].filter(Boolean).join('\n');
  try{ await navigator.clipboard.writeText(text); }catch(e){ const t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); try{document.execCommand('copy');}catch(_){} t.remove(); }
  const old=btn.textContent; btn.textContent='✓ Copied'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent=old; btn.classList.remove('copied'); },1500);
}
async function vote(id,val,btn){
  const cur=btn.getAttribute('aria-pressed')==='true'; const next=cur?null:val;
  const card=btn.closest('.card'); card.querySelectorAll('.fb').forEach(b=>b.setAttribute('aria-pressed','false'));
  if(next!==null) btn.setAttribute('aria-pressed','true');
  const it=ITEMS.find(x=>x.id===id); if(it) it.feedback=next;
  try{ await afetch(`/api/items`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,feedback:next===null?0:next})}); }catch(e){}
}

// Admin pin (team_share=true) / hide (false) / clear (null). Pin and hide are
// mutually exclusive; clicking the active one clears it. Optimistic: update the
// card + local pinned set, PATCH, and if the Pinned filter is on, re-render so
// an un-pinned card drops out.
async function togglePin(id,mode,btn){
  const it=ITEMS.find(x=>x.id===id); if(!it) return;
  const cur=it.team_share===true?true:it.team_share===false?false:null;
  const next=mode==='pin'?(cur===true?null:true):(cur===false?null:false);
  it.team_share=next;
  const set=pinnedSet(); if(next===true) set.add(id); else set.delete(id); savePinned(set);
  const card=btn.closest('.card');
  card.classList.toggle('pinned',next===true); card.classList.toggle('hidden',next===false);
  const pb=card.querySelector('.fb.pin'), hb=card.querySelector('.fb.hide');
  if(pb) pb.setAttribute('aria-pressed',String(next===true));
  if(hb) hb.setAttribute('aria-pressed',String(next===false));
  // refresh the little "Pinned/Hidden" marker in the metas row
  const metas=card.querySelector('.metas .pinmark'); if(metas) metas.remove();
  if(next!==null){ const m=document.createElement('span'); m.className='pinmark '+(next===true?'pin':'hide'); m.textContent=next===true?'📌 Pinned':'🙈 Hidden'; card.querySelector('.metas').appendChild(m); }
  try{ await afetch(`/api/items`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,team_share:next})}); }catch(e){}
  if(fPin==='pinned'&&!isPinned(it)) render();
}

function pass(it){ if(fPin==='pinned'&&!isPinned(it)) return false; if(fLowConf==='low'&&!isLowConf(it)) return false; if(fBrand!=='all'&&(it.brand||'')!==fBrand) return false; if(fSent!=='all'&&laneOf(it)!==fSent) return false; if(fCat&&(it.category||'')!==fCat) return false; if(fOutlet&&!itemHasOutlet(it,fOutlet)) return false; if(fAuthor&&!itemHasAuthor(it,fAuthor)) return false; return true; }
function render(){
  buildPulse(); buildSpotlight();
  const shown=ITEMS.filter(pass).sort((a,b)=>{ const rank=s=>s==='negative'?0:s==='neutral'?1:2; return rank(laneOf(a))-rank(laneOf(b))||(b.importance||0)-(a.importance||0)||spreadOf(b)-spreadOf(a)||new Date(b.published_at||b.seen_at||0)-new Date(a.published_at||a.seen_at||0); });
  const neg=ITEMS.filter(i=>sentOf(i)==='negative').length;
  const brandNote=fBrand==='all'?'':` · <b>${esc(fBrand)}</b>`;
  $('#status').innerHTML=`<span><b>${ITEMS.length}</b> tracked</span><span class="sep">·</span><span class="neg">${neg} negative</span><span class="sep">·</span><span>${shown.length} shown${brandNote}</span>`;
  // Deep-link filter banner (arrived from Trends) with a one-click clear.
  const df=deepFilter(); const dfEl=$('#dfilter');
  if(df){ dfEl.innerHTML=`<span><span class="dk">${esc(df.kind)}</span><b>${esc(df.val)}</b> · ${shown.length} card${shown.length===1?'':'s'}</span><button class="dfx" type="button" onclick="clearDeepFilter()">✕ Clear filter</button>`; dfEl.classList.add('on'); dfEl.hidden=false; }
  else { dfEl.classList.remove('on'); dfEl.hidden=true; }
  const list=$('#list');
  if(!shown.length){ list.innerHTML=`<div class="empty">${df?`No cards for this ${esc(df.kind.toLowerCase())} in the current window.<br>Try a wider window, or clear the filter above.`:'Nothing matches this filter.<br>Clear the brand or widen the time window.'}</div>`; return; }
  const SEC=[['negative','Needs a response','#e60000'],['positive','Wins to amplify','#0f9d58'],['neutral','Market & noted','#5b6675']];
  let html='';
  for(const [key,label,color] of SEC){ const rows=shown.filter(i=>laneOf(i)===key); if(!rows.length) continue;
    html+=`<div class="sechead"><span class="tick" style="background:${color}"></span><span class="lab">${label}</span><span class="n" style="background:${color}">${rows.length}</span></div>`;
    html+=rows.map(cardHtml).join(''); }
  list.innerHTML=html; stagger(list); animateBars(list);
  if(location.hash){ const el=document.getElementById(location.hash.slice(1)); if(el) el.scrollIntoView(); }
}

function syncControls(){
  const p=$('#pulse'); const h=p.querySelector('.hero'); if(h) h.setAttribute('aria-pressed',String(fBrand==='Vodafone'));
  p.querySelectorAll('.tile').forEach(c=>c.setAttribute('aria-pressed',String(c.dataset.b===fBrand)));
  $('#sentRow').querySelectorAll('.chip[data-v]').forEach(c=>c.setAttribute('aria-pressed',String(c.dataset.v===fSent)));
  const pc=$('#sentRow .chip[data-pin]'); if(pc) pc.setAttribute('aria-pressed',String(fPin==='pinned'));
  const lc=$('#sentRow .chip[data-lowconf]'); if(lc) lc.setAttribute('aria-pressed',String(fLowConf==='low'));
}
function buildFilters(){
  const sent=$('#sentRow');
  const opts=[['all','All'],['negative','⚠ Needs response'],['positive','Wins'],['neutral','Market']];
  sent.innerHTML=`<span class="flabel">Show</span>`+opts.map(([v,l])=>`<button class="chip ${v==='negative'?'alert':''}" type="button" data-v="${v}" aria-pressed="${fSent===v}">${l}</button>`).join('')
    +`<span class="flabel" style="padding-left:6px">·</span><button class="chip" type="button" data-pin="1" aria-pressed="${fPin==='pinned'}">📌 Pinned</button>`
    +`<button class="chip" type="button" data-lowconf="1" aria-pressed="${fLowConf==='low'}" title="Items the classifier was unsure about (confidence < 50%)">◔ Low-conf</button>`;
  sent.querySelectorAll('.chip[data-v]').forEach(c=>c.onclick=()=>{ fSent=c.dataset.v; syncControls(); render(); });
  const pin=sent.querySelector('.chip[data-pin]');
  pin.onclick=async()=>{ fPin=fPin==='pinned'?'all':'pinned'; syncControls(); if(fPin==='pinned') await loadPinnedExtras(); render(); };
  const low=sent.querySelector('.chip[data-lowconf]');
  low.onclick=()=>{ fLowConf=fLowConf==='low'?'all':'low'; syncControls(); render(); };
  const win=$('#winRow');
  const wopts=[['1','24 hours'],['2','48 hours'],['7','Week'],['30','Month']];
  win.innerHTML=`<span class="flabel">Since</span>`+wopts.map(([v,l])=>`<button class="chip" type="button" data-v="${v}" aria-pressed="${String(fWin)===v}">${l}</button>`).join('');
  win.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ fWin=Number(c.dataset.v); localStorage.setItem('pr_win',c.dataset.v); win.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed',String(x.dataset.v===c.dataset.v))); load(); });
  $('#bar2').hidden=false;
}

// Pull any pinned items that fall OUTSIDE the current window (older than the
// selected days) so the Pinned filter shows the full saved set, not just the
// pins that happen to be in view. Uses the API's fetch-by-ids.
async function loadPinnedExtras(){
  const missing=[...pinnedSet()].filter(id=>!ITEMS.some(x=>x.id===id));
  if(!missing.length) return;
  try{
    const r=await afetch(`/api/items?ids=${missing.join(',')}`);
    if(!r.ok) return; const extra=await r.json(); if(!Array.isArray(extra)) return;
    const have=new Set(ITEMS.map(i=>i.id)); for(const e of extra) if(!have.has(e.id)) ITEMS.push(e);
  }catch(e){}
}

// Skeleton placeholders — replaces the plain "Loading the board…" on first load
// and while switching windows, so the board never shows a bare text state.
function skeletons(n=4){ let h='<div class="skel-wrap">'; for(let i=0;i<n;i++) h+=`<div class="skel"><div class="ln w40"></div><div class="ln tall w90"></div><div class="ln w70"></div><div class="ln w40"></div></div>`; return h+'</div>'; }

async function load(){
  if(!authed()){ location.href='/login'; return; }           // no session and no legacy token → sign in
  if(!ITEMS.length) $('#list').innerHTML=skeletons();      // first paint: skeletons, not bare text
  else $('#list').style.opacity='.45';                     // refetch: hold the frame, don't flash
  try{
    const r=await afetch(`/api/items?days=${fWin}`);
    if(r.status===401){ location.href='/login'; return; }   // session expired / rejected → sign in
    if(r.status===403){ $('#list').innerHTML=`<div class="gate">Your account isn't authorised for this board.<br>Ask an admin to add you.</div>`; return; }
    ITEMS=await r.json(); if(!Array.isArray(ITEMS)) ITEMS=[];
    // Sync local pinned set with server pins visible in this window (covers a
    // pin made on another device), then top up out-of-window pins if filtering.
    const set=pinnedSet(); for(const it of ITEMS) if(it.team_share===true) set.add(it.id); savePinned(set);
    if(fPin==='pinned') await loadPinnedExtras();
    render();
  }catch(e){ $('#list').innerHTML=`<div class="empty">Couldn't load the board.<br>${esc(e.message||e)}</div>`; }
  finally{ $('#list').style.opacity=''; }
}

/* ── shareable branded snapshot (canvas → PNG, no libraries) ──
   Renders a clean, always-light branded image (best for WhatsApp/Slack) of the
   reputation pulse or a single card, then offers Web Share (with the file) or a
   download. Arabic headlines are drawn right-to-left. */
const SNAPW=1080, DPR=2;
function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function wrapText(c,text,maxW){ const rtl=/[؀-ۿ]/.test(text); const words=String(text).split(/\s+/); const lines=[]; let cur=''; for(const w of words){ const t=cur?cur+' '+w:w; if(c.measureText(t).width>maxW&&cur){ lines.push(cur); cur=w; } else cur=t; } if(cur) lines.push(cur); return {lines,rtl}; }
function newCanvas(h){ const cv=document.createElement('canvas'); cv.width=SNAPW*DPR; cv.height=h*DPR; const c=cv.getContext('2d'); c.scale(DPR,DPR); c.textBaseline='alphabetic'; return {cv,c}; }
function snapHeader(c,title){
  c.fillStyle='#e60000'; c.fillRect(0,0,SNAPW,150);
  c.fillStyle='#fff'; roundRect(c,48,44,64,64,16); c.fill();
  c.fillStyle='#e60000'; c.font='800 26px '+SANS; c.textAlign='left'; c.fillText('PR',62,86);
  c.fillStyle='#fff'; c.font='800 34px '+SANS; c.fillText(title,132,78);
  c.fillStyle='rgba(255,255,255,.85)'; c.font='600 15px '+SANS;
  const d=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',timeZone:'Africa/Cairo'}).toUpperCase();
  c.fillText('BRAND & REPUTATION  ·  '+d+'  ·  VODAFONE EGYPT',132,108);
}
function snapFooter(c,y){ c.fillStyle='#9aa2ad'; c.font='600 15px '+SANS; c.textAlign='left'; c.fillText('PR Radar · Vodafone Egypt — Brand & Reputation monitor',48,y); }
const SANS='-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif';
const SENTC={negative:'#e60000',positive:'#0f9d58',neutral:'#5b6675'};

function snapshotPulse(){
  const V='Vodafone'; const vr=ITEMS.filter(i=>(i.brand||'')===V);
  const vneg=vr.filter(i=>sentOf(i)==='negative').length, vpos=vr.filter(i=>sentOf(i)==='positive').length;
  const H=560; const {cv,c}=newCanvas(H);
  c.fillStyle='#faf8f7'; c.fillRect(0,0,SNAPW,H); snapHeader(c,'Reputation Pulse');
  // Vodafone hero
  c.fillStyle='#fff'; roundRect(c,48,186,SNAPW-96,150,20); c.fill();
  c.fillStyle='#e60000'; roundRect(c,72,210,84,84,18); c.fill();
  c.fillStyle='#fff'; c.font='800 44px '+SANS; c.textAlign='center'; c.fillText('V',114,270); c.textAlign='left';
  c.fillStyle='#16191f'; c.font='800 26px '+SANS; c.fillText('Vodafone',176,244);
  c.font='800 60px '+SANS; const numW=c.measureText(String(vneg)).width;   // measure at the BIG size, before switching fonts
  c.fillStyle=vneg?'#b60009':'#0f9d58'; c.fillText(String(vneg),176,308);
  c.fillStyle='#6c7480'; c.font='600 18px '+SANS; c.fillText(`negative of ${vr.length} tracked`,176+numW+18,299);
  // competitor row
  let y=384; c.fillStyle='#16191f'; c.font='700 18px '+SANS; c.fillText('Competitors',48,y); y+=14;
  for(const b of ['Orange','WE','e&']){ const rows=ITEMS.filter(i=>(i.brand||'')===b); const neg=rows.filter(i=>sentOf(i)==='negative').length;
    y+=34; c.fillStyle=BRAND_COLOR[b]; roundRect(c,48,y-16,12,12,3); c.fill();
    c.fillStyle='#3b434e'; c.font='700 17px '+SANS; c.fillText(b,72,y-4);
    c.fillStyle=neg?'#b60009':'#9aa2ad'; c.font='700 17px '+SANS; c.textAlign='right'; c.fillText(`${neg} negative · ${rows.length} tracked`,SNAPW-48,y-4); c.textAlign='left'; }
  snapFooter(c,H-30);
  openSnap(cv,'pr-radar-pulse.png','PR Radar — reputation pulse');
}

function snapshotCard(id){
  const it=ITEMS.find(x=>x.id===id); if(!it) return; const sent=sentOf(it); const spread=spreadOf(it);
  // measure headline height first
  const tmp=newCanvas(10).c; tmp.font='800 34px '+SANS; const {lines,rtl}=wrapText(tmp,it.headline||'',SNAPW-96);
  const H=320+lines.length*46+(it.summary?70:0); const {cv,c}=newCanvas(H);
  c.fillStyle='#faf8f7'; c.fillRect(0,0,SNAPW,H); snapHeader(c,'Coverage Alert');
  c.fillStyle='#fff'; roundRect(c,48,186,SNAPW-96,H-232,20); c.fill();
  c.fillStyle=SENTC[sent]; c.fillRect(48,186,7,H-232);
  let y=246; c.textAlign='left';
  // brand chip + sentiment + outlets
  const brand=it.brand||'Market';
  c.font='800 18px '+SANS; const bw=c.measureText(brand).width+28; c.fillStyle=BRAND_COLOR[it.brand]||'#6c7480'; roundRect(c,80,y-26,bw,34,9); c.fill();
  c.fillStyle='#fff'; c.fillText(brand,94,y-2);
  c.fillStyle=SENTC[sent]; c.font='800 18px '+SANS; c.fillText(SENT[sent].label.toUpperCase(),80+bw+16,y-2);
  if(spread>1){ c.fillStyle='#6c7480'; c.font='700 17px '+SANS; c.textAlign='right'; c.fillText(`◱ ${spread} outlets`,SNAPW-80,y-2); c.textAlign='left'; }
  // headline (RTL-aware)
  y+=54; c.fillStyle='#16191f'; c.font='800 34px '+SANS;
  if(rtl){ c.textAlign='right'; for(const ln of lines){ c.fillText(ln,SNAPW-80,y); y+=46; } c.textAlign='left'; }
  else { for(const ln of lines){ c.fillText(ln,80,y); y+=46; } }
  // action line
  const act=actionLine(it);
  if(act){ y+=8; c.fillStyle='#b60009'; c.font='700 19px '+SANS; const aw=wrapText(c,'→ '+act,SNAPW-160); const artl=/[؀-ۿ]/.test(act);
    if(artl){ c.textAlign='right'; for(const ln of aw.lines){ c.fillText(ln,SNAPW-80,y); y+=28; } c.textAlign='left'; }
    else for(const ln of aw.lines){ c.fillText(ln,80,y); y+=28; } }
  snapFooter(c,H-30);
  openSnap(cv,'pr-radar-card.png','PR Radar — '+(it.brand||'coverage'));
}

let SNAP_URL=null, SNAP_NAME='snapshot.png';
function openSnap(cv,filename,shareText){
  SNAP_NAME=filename;
  cv.toBlob(async(blob)=>{
    if(SNAP_URL) URL.revokeObjectURL(SNAP_URL); SNAP_URL=URL.createObjectURL(blob);
    $('#snapImg').src=SNAP_URL; $('#snap').classList.add('on');
    const file=new File([blob],filename,{type:'image/png'});
    const canShare=navigator.canShare&&navigator.canShare({files:[file]});
    const dl=$('#snapDl'); dl.textContent=canShare?'↗ Share':'↓ Save image';
    dl.onclick=async()=>{ if(canShare){ try{ await navigator.share({files:[file],text:shareText}); return; }catch(e){} } const a=document.createElement('a'); a.href=SNAP_URL; a.download=filename; a.click(); };
  },'image/png');
}
$('#snapCl').onclick=()=>$('#snap').classList.remove('on');
$('#snap').onclick=e=>{ if(e.target.id==='snap') $('#snap').classList.remove('on'); };

buildFilters();
renderAccount();
if(authed()) loadMe();
load();
</script>
