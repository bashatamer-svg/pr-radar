<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PR Radar — Admin</title>
<meta name="description" content="Manage watchlist subscribers and triage board feedback.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#f1f2f5">
<style>
  :root{
    --red:#e60000; --red-deep:#b60009;
    --bg:#f1f2f5; --card:#ffffff; --raise:#f6f7f9;
    --ink:#16191f; --ink-2:#3b434e; --muted:#6c7480; --faint:#9aa2ad; --hair:#e7e9ee; --hair-2:#eef0f3;
    --pos:#0f9d58; --pos-bg:#edfaf1; --amber:#d97706; --neg-bg:#fff2f0; --neg-line:#ffd4cf;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --mh:56px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{color:var(--red)}
  .wrap{max-width:840px;margin:0 auto;min-height:100vh;padding-bottom:70px}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:8px}

  .top{position:sticky;top:0;z-index:40;height:var(--mh);display:flex;align-items:center;gap:11px;padding:0 16px;
       background:rgba(255,255,255,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--hair)}
  .back{flex:none;display:grid;place-items:center;width:34px;height:34px;border-radius:11px;background:var(--ink);color:#fff;text-decoration:none;font-size:15px;font-weight:800}
  .ttl{flex:1;min-width:0}
  .ttl .h1{font-size:16px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .ttl .sub{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:500}

  .tabs{display:flex;gap:7px;padding:12px 16px 0}
  .tab{cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--ink-2);font-family:var(--sans);
       font-size:13px;font-weight:700;padding:8px 15px;border-radius:11px}
  .tab[aria-pressed=true]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab .n{font-family:var(--mono);font-size:10px;opacity:.7;margin-left:5px}

  .content{padding:14px 16px 0}
  .gate,.empty{text-align:center;color:var(--muted);padding:56px 26px;font-size:14px;line-height:1.7}
  .gate code{background:var(--card);border:1px solid var(--hair);padding:2px 8px;border-radius:6px;color:var(--ink);font-family:var(--mono)}

  .card{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 2px 12px -8px rgba(20,23,28,.18)}
  .card h2{margin:0 0 11px;font-size:13px;font-weight:800;letter-spacing:-.01em}

  .form{display:flex;flex-wrap:wrap;gap:8px}
  .form input{flex:1 1 150px;min-width:0;border:1px solid var(--hair);border-radius:10px;padding:9px 11px;font-family:var(--sans);font-size:13px;color:var(--ink);background:var(--raise)}
  .form input:focus{outline:none;border-color:var(--faint);background:var(--card)}
  .btn{cursor:pointer;border:0;background:var(--red);color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;padding:9px 15px;border-radius:10px;white-space:nowrap}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:var(--card);color:var(--ink-2);border:1px solid var(--hair)}
  .btn.ghost:hover{border-color:var(--faint)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .formmsg{width:100%;font-size:11.5px;font-weight:700;margin-top:2px}
  .formmsg.ok{color:var(--pos)} .formmsg.err{color:var(--red-deep)}

  .row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--hair-2)}
  .row:first-child{border-top:none}
  .row .who{flex:1;min-width:0}
  .row .who .em{font-size:13px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .who .nm{font-size:11.5px;color:var(--muted)}
  .cats{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
  .cat{font-size:10px;font-family:var(--mono);background:var(--hair-2);color:var(--ink-2);padding:2px 7px;border-radius:6px}
  .cat.all{background:var(--pos-bg);color:var(--pos)}
  .row .acts{flex:none;display:flex;gap:6px;align-items:center}
  .toggle{cursor:pointer;border:1px solid var(--hair);background:var(--card);border-radius:20px;width:42px;height:24px;position:relative;flex:none}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--faint);transition:all .15s}
  .toggle[aria-pressed=true]{background:var(--pos);border-color:var(--pos)}
  .toggle[aria-pressed=true]::after{left:20px;background:#fff}
  .x{cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--muted);width:32px;height:30px;border-radius:9px;font-size:14px;line-height:1}
  .x:hover{border-color:var(--neg-line);color:var(--red-deep);background:var(--neg-bg)}

  /* feedback */
  .fb{padding:12px 0;border-top:1px solid var(--hair-2)}
  .fb:first-child{border-top:none}
  .fb.resolved{opacity:.55}
  .fb-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--faint)}
  .kind{font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:6px;background:var(--hair-2);color:var(--ink-2)}
  .kind.bug{background:var(--neg-bg);color:var(--red-deep)} .kind.idea{background:#fff5e6;color:var(--amber)} .kind.question{background:#e9f1fb;color:#1c5cab}
  .fb .msg{font-size:13.5px;line-height:1.5;color:var(--ink);margin:6px 0 0}
  .fb .meta{font-size:11px;color:var(--muted);margin-top:5px}
  .fb .acts{margin-top:8px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a class="back" id="backLink" href="/" title="Back to the board" aria-label="Back to the board">‹</a>
    <div class="ttl"><div class="h1">Admin</div><div class="sub">Subscribers &amp; feedback · Vodafone Egypt</div></div>
  </header>
  <div class="tabs" id="tabs" hidden>
    <button class="tab" type="button" data-tab="subs" aria-pressed="true">Subscribers <span class="n" id="nSubs"></span></button>
    <button class="tab" type="button" data-tab="fb" aria-pressed="false">Feedback <span class="n" id="nFb"></span></button>
    <button class="tab" type="button" data-tab="requests" aria-pressed="false">Requests <span class="n" id="nReq"></span></button>
    <button class="tab" type="button" data-tab="users" aria-pressed="false">Users <span class="n" id="nUsers"></span></button>
    <button class="tab" type="button" data-tab="audit" aria-pressed="false">Audit <span class="n" id="nAudit"></span></button>
    <button class="tab" type="button" data-tab="tools" aria-pressed="false">Tools</button>
  </div>
  <main class="content" id="content"><div class="gate">Loading…</div></main>
</div>

<script>
const $=(s,r=document)=>r.querySelector(s);
const esc=(s)=>String(s==null?'':s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

const params=new URLSearchParams(location.search);
const token='';   // ?t= retired (Task 18) — sign-in session only
let session=(()=>{ try{ return JSON.parse(localStorage.getItem('pr_session')||'null'); }catch(e){ return null; } })();
$('#backLink').href=session?'/':(token?`/?t=${encodeURIComponent(token)}`:'/');

let _cfg=null;
async function authConfig(){ if(_cfg) return _cfg; try{ _cfg=await (await fetch('/api/auth?view=config')).json(); }catch(e){ _cfg={}; } return _cfg; }
async function refreshSession(){
  if(!session?.refresh_token) return false;
  const c=await authConfig(); if(!c.supabaseUrl||!c.anonKey) return false;
  try{ const r=await fetch(`${c.supabaseUrl}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{apikey:c.anonKey,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:session.refresh_token})});
    if(!r.ok) return false; const d=await r.json(); if(!d.access_token) return false;
    session={access_token:d.access_token,refresh_token:d.refresh_token||session.refresh_token}; try{ localStorage.setItem('pr_session',JSON.stringify(session)); }catch(e){} return true;
  }catch(e){ return false; }
}
function authURL(path){ if(session) return path; return token?`${path}${path.includes('?')?'&':'?'}t=${encodeURIComponent(token)}`:path; }
async function afetch(path,opts={},_retried){
  const o={...opts,headers:{...(opts.headers||{})}};
  if(session) o.headers.Authorization=`Bearer ${session.access_token}`;
  const r=await fetch(authURL(path),o);
  if(r.status===401 && session && !_retried && await refreshSession()) return afetch(path,opts,true);
  return r;
}

let TAB='subs', SUBS=[], FB=[], USERS=[], AUDIT=[], REQ=[];
const api=(opts)=>afetch(`/api/admin${opts.q?opts.q.replace(/^&/,'?'):''}`,{method:opts.method||'GET',headers:opts.body?{'Content-Type':'application/json'}:undefined,body:opts.body?JSON.stringify(opts.body):undefined});
const when=(t)=>{ try{ return new Date(t).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit',timeZone:'Africa/Cairo'}); }catch(e){ return ''; } };

/* ── Subscribers ── */
function subRow(s){
  const cats=Array.isArray(s.categories)&&s.categories.length
    ? s.categories.map(c=>`<span class="cat">${esc(c)}</span>`).join('')
    : `<span class="cat all">all categories</span>`;
  return `<div class="row" data-id="${s.id}">
    <div class="who">
      <div class="em">${esc(s.email)}</div>
      <div class="nm">${s.name?esc(s.name):'—'} · added ${when(s.created_at)}</div>
      <div class="cats">${cats}</div>
    </div>
    <div class="acts">
      <button class="toggle" type="button" aria-pressed="${!!s.active}" title="${s.active?'Active — click to pause':'Paused — click to activate'}" onclick="toggleSub(${s.id},this)"></button>
      <button class="x" type="button" title="Remove subscriber" onclick="removeSub(${s.id})">✕</button>
    </div>
  </div>`;
}
function renderSubs(){
  const active=SUBS.filter(s=>s.active).length;
  $('#content').innerHTML=`
    <div class="card">
      <h2>Add a subscriber</h2>
      <div class="form">
        <input id="fEmail" type="email" placeholder="email@vodafone.com" autocomplete="off">
        <input id="fName" type="text" placeholder="Name (optional)" autocomplete="off">
        <input id="fCats" type="text" placeholder="Categories, comma-sep (blank = all)" autocomplete="off">
        <button class="btn" id="addBtn" type="button">Add</button>
        <div class="formmsg" id="fMsg"></div>
      </div>
    </div>
    <div class="card">
      <h2>Subscribers · ${active} active / ${SUBS.length} total</h2>
      ${SUBS.length?SUBS.map(subRow).join(''):`<div class="empty">No subscribers yet.<br>Add one above — a subscriber with no categories gets the full daily brief.</div>`}
    </div>`;
  $('#addBtn').onclick=addSub;
  $('#fEmail').addEventListener('keydown',e=>{ if(e.key==='Enter') addSub(); });
}
async function addSub(){
  const email=$('#fEmail').value.trim(), name=$('#fName').value.trim(), categories=$('#fCats').value.trim();
  const msg=$('#fMsg'), btn=$('#addBtn');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ msg.textContent='Enter a valid email.'; msg.className='formmsg err'; return; }
  btn.disabled=true;
  try{
    const r=await api({method:'POST',body:{email,name,categories}});
    if(!r.ok){ const e=await r.json().catch(()=>({})); msg.textContent=e.error||'Failed to add.'; msg.className='formmsg err'; btn.disabled=false; return; }
    msg.textContent='Added ✓'; msg.className='formmsg ok';
    await loadSubs();
  }catch(e){ msg.textContent='Network error.'; msg.className='formmsg err'; btn.disabled=false; }
}
async function toggleSub(id,btn){
  const next=btn.getAttribute('aria-pressed')!=='true';
  btn.setAttribute('aria-pressed',String(next));
  const s=SUBS.find(x=>x.id===id); if(s) s.active=next;
  try{ await api({method:'PATCH',body:{id,active:next}}); }catch(e){}
  // refresh the "N active" header count without a full reload
  const active=SUBS.filter(x=>x.active).length; const h=$('.card:last-child h2'); if(h) h.textContent=`Subscribers · ${active} active / ${SUBS.length} total`;
  $('#nSubs').textContent=SUBS.length;
}
async function removeSub(id){
  if(!confirm('Remove this subscriber?')) return;
  try{ await api({method:'DELETE',q:`&id=${id}`}); }catch(e){}
  SUBS=SUBS.filter(s=>s.id!==id); $('#nSubs').textContent=SUBS.length; renderSubs();
}

/* ── Feedback ── */
function fbRow(f){
  return `<div class="fb ${f.resolved?'resolved':''}" data-id="${f.id}">
    <div class="fb-top">
      ${f.kind?`<span class="kind ${esc(f.kind)}">${esc(f.kind)}</span>`:'<span class="kind">note</span>'}
      <span>${when(f.created_at)}</span>${f.page?`<span>· ${esc(f.page)}</span>`:''}
    </div>
    <p class="msg" dir="auto">${esc(f.message)}</p>
    <div class="meta">${f.name?esc(f.name):'Anonymous'}${f.email?` · <a href="mailto:${esc(f.email)}">${esc(f.email)}</a>`:''}</div>
    <div class="acts">
      <button class="btn ghost sm" type="button" onclick="toggleFb(${f.id},${f.resolved?'true':'false'},this)">${f.resolved?'Re-open':'Mark resolved'}</button>
    </div>
  </div>`;
}
function renderFb(){
  const open=FB.filter(f=>!f.resolved).length;
  $('#content').innerHTML=`<div class="card">
    <h2>Feedback · ${open} open / ${FB.length} total</h2>
    ${FB.length?FB.map(fbRow).join(''):`<div class="empty">No feedback yet.<br>Messages from the board's feedback form land here.</div>`}
  </div>`;
}
async function toggleFb(id,resolved,btn){
  const next=!resolved;
  const f=FB.find(x=>x.id===id); if(f) f.resolved=next;
  btn.closest('.fb').classList.toggle('resolved',next); btn.textContent=next?'Re-open':'Mark resolved';
  btn.setAttribute('onclick',`toggleFb(${id},${next},this)`);
  const open=FB.filter(x=>!x.resolved).length; const h=$('#content h2'); if(h) h.textContent=`Feedback · ${open} open / ${FB.length} total`; $('#nFb').textContent=FB.length;
  try{ await api({method:'PATCH',q:'&resource=feedback',body:{id,resolved:next}}); }catch(e){}
}

/* ── Users (RBAC allowlist) ── */
function userRow(u){
  return `<div class="row" data-id="${u.id}">
    <div class="who">
      <div class="em">${esc(u.email)} <span class="cat ${u.role==='admin'?'all':''}" style="margin-left:4px">${esc(u.role)}</span></div>
      <div class="nm">${u.name?esc(u.name):'—'} · added ${when(u.created_at)}${u.last_seen_at?` · seen ${when(u.last_seen_at)}`:''}</div>
    </div>
    <div class="acts">
      <button class="btn ghost sm" type="button" title="Set a new password for this user" onclick="setUserPassword(${u.id},'${esc(u.email)}')">Set password</button>
      <button class="btn ghost sm" type="button" title="Toggle admin/viewer" onclick="toggleRole(${u.id},'${esc(u.role)}','${esc(u.email)}',this)">${u.role==='admin'?'Make viewer':'Make admin'}</button>
      <button class="toggle" type="button" aria-pressed="${!!u.active}" title="${u.active?'Active — click to block':'Blocked — click to allow'}" onclick="toggleUser(${u.id},'${esc(u.email)}',this)"></button>
      <button class="x" type="button" title="Remove user" onclick="removeUser(${u.id},'${esc(u.email)}')">✕</button>
    </div>
  </div>`;
}
function renderUsers(){
  const admins=USERS.filter(u=>u.role==='admin').length;
  $('#content').innerHTML=`
    <div class="card">
      <h2>Add a user (allowlist)</h2>
      <div class="form">
        <input id="uEmail" type="email" placeholder="email@vodafone.com" autocomplete="off">
        <input id="uName" type="text" placeholder="Name (optional)" autocomplete="off">
        <select id="uRole" class="btn ghost" style="flex:0 0 auto">
          <option value="viewer">Viewer</option><option value="admin">Admin</option>
        </select>
        <button class="btn" id="uAddBtn" type="button">Add</button>
        <div class="formmsg" id="uMsg"></div>
      </div>
    </div>
    <div class="card">
      <h2>Users · ${admins} admin / ${USERS.length} total</h2>
      ${USERS.length?USERS.map(userRow).join(''):`<div class="empty">No users yet.<br>Only allowlisted emails can sign in.</div>`}
    </div>`;
  $('#uAddBtn').onclick=addUser;
  $('#uEmail').addEventListener('keydown',e=>{ if(e.key==='Enter') addUser(); });
}
async function addUser(){
  const email=$('#uEmail').value.trim(), name=$('#uName').value.trim(), role=$('#uRole').value;
  const msg=$('#uMsg'), btn=$('#uAddBtn');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ msg.textContent='Enter a valid email.'; msg.className='formmsg err'; return; }
  btn.disabled=true;
  try{
    const r=await api({method:'POST',q:'&resource=users',body:{email,name,role}});
    if(!r.ok){ const e=await r.json().catch(()=>({})); msg.textContent=e.error||'Failed to add.'; msg.className='formmsg err'; btn.disabled=false; return; }
    msg.textContent='Added ✓'; msg.className='formmsg ok'; await loadUsers();
  }catch(e){ msg.textContent='Network error.'; msg.className='formmsg err'; btn.disabled=false; }
}
async function setUserPassword(id,email){
  const pw=prompt(`Set a new password for ${email} (min 8 characters). Share it with them; they can change it later.`);
  if(pw==null) return;
  if(pw.length<8){ alert('Password must be at least 8 characters.'); return; }
  try{ const r=await api({method:'PATCH',q:'&resource=users',body:{id,email,password:pw}}); if(!r.ok){ const e=await r.json().catch(()=>({})); alert(e.error||'Failed.'); return; } alert('Password updated for '+email+'.'); }catch(e){ alert('Network error.'); }
}
async function toggleRole(id,cur,email,btn){
  const next=cur==='admin'?'viewer':'admin';
  try{ const r=await api({method:'PATCH',q:'&resource=users',body:{id,role:next,email}}); if(!r.ok){ const e=await r.json().catch(()=>({})); alert(e.error||'Failed.'); return; } }catch(e){ return; }
  await loadUsers();
}
async function toggleUser(id,email,btn){
  const next=btn.getAttribute('aria-pressed')!=='true';
  try{ const r=await api({method:'PATCH',q:'&resource=users',body:{id,active:next,email}}); if(!r.ok){ const e=await r.json().catch(()=>({})); alert(e.error||'Failed.'); return; } }catch(e){ return; }
  const u=USERS.find(x=>x.id===id); if(u) u.active=next; btn.setAttribute('aria-pressed',String(next));
}
async function removeUser(id,email){
  if(!confirm('Remove this user? They will lose access immediately.')) return;
  try{ const r=await api({method:'DELETE',q:`&resource=users&id=${id}&email=${encodeURIComponent(email)}`}); if(!r.ok){ const e=await r.json().catch(()=>({})); alert(e.error||'Failed.'); return; } }catch(e){ return; }
  USERS=USERS.filter(u=>u.id!==id); $('#nUsers').textContent=USERS.length; renderUsers();
}

/* ── Access requests ── */
function reqRow(r){
  return `<div class="row" data-id="${r.id}">
    <div class="who"><div class="em">${esc(r.email)}</div><div class="nm">requested ${when(r.created_at)}</div></div>
    <div class="acts">
      <button class="btn sm" type="button" title="Approve as a viewer" onclick="approveReq(${r.id},'${esc(r.email)}','viewer')">Approve</button>
      <button class="btn ghost sm" type="button" title="Approve as an admin" onclick="approveReq(${r.id},'${esc(r.email)}','admin')">as admin</button>
      <button class="x" type="button" title="Reject request" onclick="rejectReq(${r.id},'${esc(r.email)}')">✕</button>
    </div>
  </div>`;
}
function renderReq(){
  $('#content').innerHTML=`<div class="card">
    <h2>Access requests · ${REQ.length} pending</h2>
    ${REQ.length?REQ.map(reqRow).join(''):`<div class="empty">No pending requests.<br>People who ask for access on the login screen show up here to approve or reject.</div>`}
  </div>`;
}
async function approveReq(id,email,role){
  try{ const r=await api({method:'PATCH',q:'&resource=requests',body:{id,email,role}}); if(!r.ok){ const e=await r.json().catch(()=>({})); alert(e.error||'Failed.'); return; } }catch(e){ return; }
  REQ=REQ.filter(x=>x.id!==id); $('#nReq').textContent=REQ.length; renderReq(); loadUsers();
}
async function rejectReq(id,email){
  if(!confirm(`Reject the access request from ${email}?`)) return;
  try{ const r=await api({method:'DELETE',q:`&resource=requests&id=${id}&email=${encodeURIComponent(email)}`}); if(!r.ok){ const e=await r.json().catch(()=>({})); alert(e.error||'Failed.'); return; } }catch(e){ return; }
  REQ=REQ.filter(x=>x.id!==id); $('#nReq').textContent=REQ.length; renderReq();
}

/* ── Audit log ── */
function auditRow(a){
  const detail=a.detail?` <span class="cat">${esc(typeof a.detail==='object'?JSON.stringify(a.detail):a.detail)}</span>`:'';
  return `<div class="fb" data-id="${a.id}">
    <div class="fb-top"><span class="kind">${esc(a.action)}</span><span>${when(a.created_at)}</span>${a.target?`<span>· ${esc(a.target)}</span>`:''}</div>
    <div class="meta">${esc(a.actor||'—')}${a.actor_role?` · ${esc(a.actor_role)}`:''}${detail}</div>
  </div>`;
}
function renderAudit(){
  $('#content').innerHTML=`<div class="card">
    <h2>Audit log · last ${AUDIT.length}</h2>
    ${AUDIT.length?AUDIT.map(auditRow).join(''):`<div class="empty">No audit entries yet.<br>Admin actions (adds, role changes, edits) are recorded here.</div>`}
  </div>`;
}

/* ── Tools ── */
function renderTools(){
  $('#content').innerHTML=`
    <div class="card">
      <h2>Backfill authors</h2>
      <div class="nm" style="line-height:1.6;margin:0 0 11px">Fill the “—” author on recent board cards the 30-min poll stored without a byline. Runs the resolve → fetch → author check (with the AI fallback) and writes the byline back. Safe: it only reads the articles and updates authors — no emails, no re-ingest. Run it again until nothing remains.</div>
      <div class="form">
        <input id="baDays" type="number" min="1" max="30" value="7" title="Look back this many days" aria-label="Days" style="flex:0 0 84px">
        <input id="baLimit" type="number" min="1" max="200" value="40" title="Max items per pass" aria-label="Limit" style="flex:0 0 84px">
        <button class="btn" id="baBtn" type="button">Backfill authors</button>
        <div class="formmsg" id="baMsg"></div>
      </div>
      <div class="nm" id="baGap" style="margin-top:9px;font-weight:700;color:var(--ink-2)">Checking backlog…</div>
      <div class="nm" style="margin-top:4px;color:var(--faint)">days back · max per pass. Each pass fills up to the AI-byline cap; a big backlog may need a few runs.</div>
    </div>
    <div class="card">
      <h2>WhatsApp urgent alerts</h2>
      <div class="nm" style="line-height:1.6;margin:0 0 11px">Urgent (importance-5) items are also sent as WhatsApp DMs to each configured recipient (the official API can’t post to a group, so it messages people individually). Configure the number, token, recipients and template in the environment, then send a test to verify delivery.</div>
      <div class="nm" id="waStatus" style="font-weight:700;color:var(--ink-2);margin-bottom:10px">Checking…</div>
      <div class="form">
        <button class="btn" id="waTestBtn" type="button" disabled>Send test alert</button>
        <div class="formmsg" id="waMsg"></div>
      </div>
    </div>`;
  $('#baBtn').onclick=runBackfill;
  $('#baDays').addEventListener('change',loadAuthorGap);
  loadAuthorGap();
  $('#waTestBtn').onclick=runWhatsappTest;
  loadWhatsappStatus();
}
async function loadWhatsappStatus(){
  const el=$('#waStatus'), btn=$('#waTestBtn'); if(!el) return;
  try{
    const r=await api({q:'&view=whatsapp-status'});
    const s=await r.json().catch(()=>({}));
    if(!r.ok){ el.textContent=''; return; }
    if(s.enabled && s.hasToken && s.hasPhoneId && s.recipients>0){
      el.innerHTML=`<span style="color:var(--pos)">● Configured</span> · ${s.recipients} recipient${s.recipients===1?'':'s'} · template “${esc(s.template)}”`;
      if(btn) btn.disabled=false;
    }else{
      const miss=[]; if(!s.enabled) miss.push('WHATSAPP_ENABLED=1'); if(!s.hasToken) miss.push('WHATSAPP_TOKEN'); if(!s.hasPhoneId) miss.push('WHATSAPP_PHONE_ID'); if(!s.recipients) miss.push('WHATSAPP_TO');
      el.innerHTML=`<span style="color:var(--amber)">● Not configured</span> — set ${esc(miss.join(', '))} in the environment.`;
      if(btn) btn.disabled=true;
    }
  }catch(e){ el.textContent=''; }
}
async function runWhatsappTest(){
  const btn=$('#waTestBtn'), msg=$('#waMsg');
  btn.disabled=true; const label=btn.textContent; btn.textContent='Sending…'; msg.textContent=''; msg.className='formmsg';
  try{
    const r=await api({method:'POST',q:'&resource=whatsapp-test'});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){ msg.textContent=d.error||'Failed.'; msg.className='formmsg err'; }
    else if(d.skipped){ msg.textContent='WhatsApp isn’t configured yet.'; msg.className='formmsg err'; }
    else{ msg.className='formmsg '+(d.failed?'err':'ok'); msg.textContent=`Sent to ${d.sent} of ${d.recipients}`+(d.failed?` · ${d.failed} failed (check logs)`:' ✓'); }
  }catch(e){ msg.textContent='Network error.'; msg.className='formmsg err'; }
  btn.disabled=false; btn.textContent=label;
}
async function loadAuthorGap(){
  const el=$('#baGap'); if(!el) return;
  const days=Math.max(1,Math.min(Number($('#baDays').value)||7,30));
  el.textContent='Checking backlog…';
  try{
    const r=await api({q:`&view=author-gap&days=${days}`});
    const d=await r.json().catch(()=>({}));
    if(r.ok && typeof d.missing==='number'){
      el.textContent = d.missing===0
        ? `✓ No cards are missing an author in the last ${days} days.`
        : `${d.missing} card${d.missing===1?'':'s'} still missing an author in the last ${days} days.`;
    } else el.textContent='';
  }catch(e){ el.textContent=''; }
}
async function runBackfill(){
  const btn=$('#baBtn'), msg=$('#baMsg');
  const days=Math.max(1,Math.min(Number($('#baDays').value)||7,30));
  const limit=Math.max(1,Math.min(Number($('#baLimit').value)||40,200));
  btn.disabled=true; const label=btn.textContent; btn.textContent='Working…'; msg.textContent='Fetching articles…'; msg.className='formmsg';
  try{
    const r=await api({method:'POST',q:'&resource=backfill-authors',body:{days,limit}});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){ msg.textContent=d.error||'Failed.'; msg.className='formmsg err'; }
    else{
      msg.className='formmsg ok';
      msg.textContent=`Filled ${d.filled} of ${d.scanned} scanned · ${d.remaining} still missing`+(d.remaining>0?' — run again to continue.':' ✓ all done.');
      loadAudit(); loadAuthorGap();
    }
  }catch(e){ msg.textContent='Network error.'; msg.className='formmsg err'; }
  btn.disabled=false; btn.textContent=label;
}

/* ── shell ── */
async function loadSubs(){ const r=await api({q:'&view=subscribers'}); SUBS=await r.json(); if(!Array.isArray(SUBS)) SUBS=[]; $('#nSubs').textContent=SUBS.length; if(TAB==='subs') renderSubs(); }
async function loadFb(){ const r=await api({q:'&view=feedback'}); FB=await r.json(); if(!Array.isArray(FB)) FB=[]; $('#nFb').textContent=FB.length; if(TAB==='fb') renderFb(); }
async function loadUsers(){ const r=await api({q:'&view=users'}); USERS=await r.json(); if(!Array.isArray(USERS)) USERS=[]; $('#nUsers').textContent=USERS.length; if(TAB==='users') renderUsers(); }
async function loadAudit(){ const r=await api({q:'&view=audit'}); AUDIT=await r.json(); if(!Array.isArray(AUDIT)) AUDIT=[]; $('#nAudit').textContent=AUDIT.length; if(TAB==='audit') renderAudit(); }
async function loadReq(){ const r=await api({q:'&view=requests'}); REQ=await r.json(); if(!Array.isArray(REQ)) REQ=[]; $('#nReq').textContent=REQ.length; if(TAB==='requests') renderReq(); }
function selectTab(t){
  TAB=t; $('#tabs').querySelectorAll('.tab').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.tab===t)));
  if(t==='subs') renderSubs();
  else if(t==='fb') renderFb();
  else if(t==='requests'){ renderReq(); loadReq(); }
  else if(t==='users'){ renderUsers(); if(!USERS.length) loadUsers(); }
  else if(t==='audit'){ renderAudit(); loadAudit(); }
  else if(t==='tools') renderTools();
}

async function boot(){
  if(!session && !token){ location.href='/login'; return; }
  try{
    const probe=await api({q:'&view=subscribers'});
    if(probe.status===401){ location.href='/login'; return; }
    if(probe.status===403){ $('#content').innerHTML=`<div class="gate">Admin only.<br>Your account can view the board but isn't an admin. Ask an admin to grant access.</div>`; return; }
    SUBS=await probe.json(); if(!Array.isArray(SUBS)) SUBS=[];
    $('#tabs').hidden=false; $('#nSubs').textContent=SUBS.length;
    $('#tabs').querySelectorAll('.tab').forEach(b=>b.onclick=()=>selectTab(b.dataset.tab));
    renderSubs();
    loadFb(); loadReq(); loadUsers(); loadAudit();   // warm the other tabs in the background
  }catch(e){ $('#content').innerHTML=`<div class="gate">Couldn't load admin.<br>${esc(e.message||e)}</div>`; }
}
boot();
</script>
