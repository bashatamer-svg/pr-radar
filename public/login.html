<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in · PR Radar</title>
<meta name="description" content="Sign in to PR Radar — Brand & Reputation monitor for Vodafone Egypt.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#e60000">
<style>
  :root{
    --red:#e60000; --bg:#f1f2f5; --card:#fff; --ink:#16191f; --ink-2:#3b434e; --muted:#6c7480; --faint:#9aa2ad; --hair:#e7e9ee;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
       min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--hair);border-radius:18px;overflow:hidden;
        box-shadow:0 12px 40px rgba(16,20,28,.08)}
  .head{background:var(--red);padding:22px 26px;display:flex;align-items:center;gap:11px}
  .mark{width:36px;height:36px;border-radius:10px;background:#fff;color:var(--red);font-weight:800;font-size:14px;
        display:grid;place-items:center;letter-spacing:-.02em}
  .head .h1{color:#fff;font-weight:800;font-size:17px}
  .head .sub{color:rgba(255,255,255,.82);font-size:11px;letter-spacing:.04em}
  .body{padding:24px 26px 26px}
  .tabs{display:flex;gap:6px;margin-bottom:18px}
  .tab{flex:1;cursor:pointer;border:1px solid var(--hair);background:#fbfcfd;color:var(--ink-2);font-family:inherit;
       font-size:13px;font-weight:700;padding:9px;border-radius:10px}
  .tab[aria-pressed=true]{background:var(--ink);color:#fff;border-color:var(--ink)}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin:12px 0 6px}
  input{width:100%;font-size:15px;padding:12px 13px;border:1px solid var(--hair);border-radius:11px;background:#fbfcfd;
        font-family:inherit;color:var(--ink)}
  input:focus{outline:2px solid var(--red);outline-offset:1px;border-color:transparent}
  button.go{margin-top:18px;width:100%;cursor:pointer;border:0;background:var(--red);color:#fff;font-weight:700;font-size:14.5px;
        padding:13px;border-radius:11px;font-family:inherit}
  button.go:disabled{opacity:.6;cursor:default}
  .msg{margin-top:15px;font-size:13px;line-height:1.5;padding:11px 13px;border-radius:11px;display:none}
  .msg.show{display:block}
  .msg.ok{background:#edfaf1;color:#0c7a43;border:1px solid #c3e9d1}
  .msg.err{background:#fff2f0;color:#b60009;border:1px solid #ffd4cf}
  .hint{font-size:11px;color:var(--faint);margin-top:6px}
  .showpw{display:flex;align-items:center;gap:7px;margin-top:11px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer}
  .showpw input{width:auto;margin:0}
  .foot{margin-top:16px;font-size:11px;color:var(--faint)}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="mark">PR</div>
      <div><div class="h1">PR Radar</div><div class="sub">BRAND &amp; REPUTATION · VODAFONE EGYPT</div></div>
    </div>
    <div class="body">
      <div class="tabs">
        <button class="tab" type="button" id="tabSignin" aria-pressed="true">Sign in</button>
        <button class="tab" type="button" id="tabSignup" aria-pressed="false">Create account</button>
      </div>
      <form id="form" autocomplete="on">
        <label for="email">Work email</label>
        <input type="email" id="email" name="email" placeholder="you@vodafone.com" required autocomplete="username" autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
        <div id="confirmWrap" hidden>
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password">
        </div>
        <div class="hint" id="pwHint" hidden>At least 8 characters.</div>
        <label class="showpw"><input type="checkbox" id="showpw"> Show password</label>
        <button class="go" id="btn" type="submit">Sign in</button>
      </form>
      <div class="msg" id="msg"></div>
      <div class="foot" id="foot">Access is limited to approved addresses. First time? Choose “Create account” to set your password.</div>
    </div>
  </div>
<script>
  const $ = (s) => document.querySelector(s);
  // Already signed in? Go straight to the board.
  try{ if(JSON.parse(localStorage.getItem('pr_session')||'null')) location.replace('/'); }catch(e){}

  let mode = 'signin';
  const form=$('#form'), btn=$('#btn'), msg=$('#msg'), pw=$('#password'), pwHint=$('#pwHint');
  const confirmWrap=$('#confirmWrap'), confirm=$('#confirm');
  function show(kind,html){ msg.className='msg show '+kind; msg.innerHTML=html; }
  function clearMsg(){ msg.className='msg'; msg.innerHTML=''; }
  function setMode(m){
    mode=m;
    $('#tabSignin').setAttribute('aria-pressed',String(m==='signin'));
    $('#tabSignup').setAttribute('aria-pressed',String(m==='signup'));
    btn.textContent = m==='signin' ? 'Sign in' : 'Create account';
    pw.setAttribute('autocomplete', m==='signin' ? 'current-password' : 'new-password');
    pw.placeholder = m==='signin' ? 'Your password' : 'Choose a password';
    pwHint.hidden = m!=='signup';
    confirmWrap.hidden = m!=='signup';
    if(m!=='signup') confirm.value='';
    clearMsg();
  }
  $('#tabSignin').onclick=()=>setMode('signin');
  $('#tabSignup').onclick=()=>setMode('signup');
  $('#showpw').onchange=(e)=>{ const t=e.target.checked?'text':'password'; pw.type=t; confirm.type=t; };

  function saveSession(d){ try{ localStorage.setItem('pr_session', JSON.stringify({access_token:d.access_token, refresh_token:d.refresh_token||''})); }catch(e){} }

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const email=$('#email').value.trim(), password=pw.value;
    if(!email || !password) return;
    if(mode==='signup'){
      if(password.length<8){ show('err','Password must be at least 8 characters.'); return; }
      if(password!==confirm.value){ show('err','The two passwords don’t match.'); return; }
    }
    btn.disabled=true; btn.textContent = mode==='signin' ? 'Signing in…' : 'Creating…';
    try{
      const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode,email,password})});
      const d=await r.json().catch(()=>({}));
      if(r.ok && d.access_token){ saveSession(d); location.href='/'; return; }
      if(r.ok){ show('ok','Account ready — signing you in…'); location.href='/'; return; }
      if(r.status===409){ show('err','An account already exists for this email. Switch to <b>Sign in</b>.'); setMode('signin'); }
      else if(r.status===403){ show('err', d.error || "This email isn't authorised. Ask an admin to add you."); }
      else if(r.status===401){ show('err','Wrong email or password.'); }
      else { show('err', d.error || 'Something went wrong. Please try again.'); }
    }catch(err){ show('err','Network error. Please try again in a moment.'); }
    btn.disabled=false; btn.textContent = mode==='signin' ? 'Sign in' : 'Create account';
  });
</script>
</body>
</html>
