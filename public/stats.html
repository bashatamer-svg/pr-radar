<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PR Radar — Trends</title>
<meta name="description" content="Share-of-voice, sentiment and coverage trends for Vodafone Egypt PR monitoring.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#f1f2f5">
<style>
  /* Same design tokens as the board (index.html) — one visual system. */
  :root{
    --red:#e60000; --red-deep:#b60009; --red-glow:rgba(230,0,0,.28);
    --bg:#f1f2f5; --card:#ffffff; --raise:#f6f7f9;
    --ink:#16191f; --ink-2:#3b434e; --muted:#6c7480; --faint:#9aa2ad; --hair:#e7e9ee; --hair-2:#eef0f3;
    --neg:#e60000; --neg-bg:#fff2f0; --neg-line:#ffd4cf;
    --pos:#0f9d58; --pos-bg:#edfaf1;
    --neu:#5b6675; --neu-bg:#f0f3f7;
    --amber:#d97706;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --mh:56px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{color:var(--red)}
  .wrap{max-width:840px;margin:0 auto;min-height:100vh;padding-bottom:70px}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:8px}

  .top{position:sticky;top:0;z-index:40;height:var(--mh);display:flex;align-items:center;gap:11px;padding:0 16px;
       background:rgba(255,255,255,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--hair)}
  .back{flex:none;display:grid;place-items:center;width:34px;height:34px;border-radius:11px;background:var(--ink);
        color:#fff;text-decoration:none;font-size:15px;font-weight:800}
  .ttl{flex:1;min-width:0}
  .ttl .h1{font-size:16px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .ttl .sub{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:500}
  .clock{flex:none;text-align:right;background:var(--raise);border:1px solid var(--hair);border-radius:9px;padding:5px 9px}
  .clock .t{font-family:var(--mono);font-size:12px;font-weight:700;line-height:1.1}
  .clock .d{font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.08em}

  /* One filter row above everything it scopes (never per-chart). */
  .bar2{position:sticky;top:var(--mh);z-index:30;background:rgba(241,242,245,.9);backdrop-filter:blur(12px);
        border-bottom:1px solid var(--hair);padding:11px 16px 10px}
  .frow{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
  .frow::-webkit-scrollbar{display:none}
  .flabel{flex:none;align-self:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding-right:2px}
  .chip{flex:none;cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--ink-2);
        font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:11px;white-space:nowrap;transition:all .12s}
  .chip:hover{border-color:var(--faint)}
  .chip[aria-pressed=true]{background:var(--ink);color:#fff;border-color:var(--ink)}

  .content{padding:14px 16px 0}
  .empty,.gate{text-align:center;color:var(--muted);padding:64px 26px;font-size:14px;line-height:1.7}
  .gate code{background:var(--card);border:1px solid var(--hair);padding:2px 8px;border-radius:6px;color:var(--ink);font-family:var(--mono)}

  /* KPI stat tiles */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:12px 13px;animation:rise .5s both}
  .kpi .kl{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.02em}
  .kpi .kv{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-top:5px}
  .kpi .kv.neg{color:var(--red-deep)}
  .kpi .ks{font-size:10.5px;color:var(--faint);margin-top:3px;font-weight:600}

  /* chart cards */
  .cardc{background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:15px 16px;margin:12px 0;
         box-shadow:0 2px 12px -8px rgba(20,23,28,.18);animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .chead{display:flex;align-items:baseline;gap:9px}
  .chead .ct{font-size:14px;font-weight:800;letter-spacing:-.01em}
  .chead .cs{font-size:11px;color:var(--faint);font-weight:500}
  .chead .tgl{margin-left:auto;cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--muted);
              font-family:var(--sans);font-size:11px;font-weight:700;padding:5px 10px;border-radius:9px;white-space:nowrap}
  .chead .tgl:hover{border-color:var(--faint)}
  .legend{display:flex;flex-wrap:wrap;gap:5px 14px;margin:10px 0 2px;font-size:11.5px;color:var(--ink-2);font-weight:600}
  .legend .li{display:inline-flex;align-items:center;gap:6px}
  .legend .sw{width:10px;height:10px;border-radius:3px;flex:none}
  .legend .sw.line{height:3px;border-radius:2px;width:14px}
  .cbody{margin-top:6px}
  .cbody svg{display:block;width:100%}
  .cbody.faded{opacity:.45;transition:opacity .15s}
  svg text{font-family:var(--sans)}
  .axis{font-size:10px;fill:var(--muted)}
  .gline{stroke:var(--hair-2);stroke-width:1}
  .baseline{stroke:var(--hair);stroke-width:1}

  /* leaderboard-style rows (categories / outlets / authors) */
  .rows{margin-top:8px}
  .lrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--hair-2)}
  .lrow:first-child{border-top:none}
  .lrow .nm{flex:0 1 34%;min-width:0;font-size:12.5px;font-weight:600;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .nm .sub{display:block;font-size:10px;color:var(--faint);font-weight:500;overflow:hidden;text-overflow:ellipsis}
  .lrow .bar{flex:1;height:12px;border-radius:4px;background:var(--hair-2);overflow:hidden;display:flex}
  .lrow .bar i{display:block;height:100%}
  .lrow .val{flex:none;min-width:64px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--ink-2);white-space:nowrap}
  .lrow .val b.neg{color:var(--red-deep)}
  .lrow .spark{flex:none;width:72px}
  .badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.04em;padding:2px 6px;border-radius:5px;
         background:var(--neg-bg);color:var(--red-deep);box-shadow:inset 0 0 0 1px var(--neg-line);vertical-align:1px;margin-left:5px}
  .badge.lean{background:#fff5e6;color:var(--amber);box-shadow:inset 0 0 0 1px #f5dcb0}

  /* table view — the accessible twin of every chart */
  .tbl{display:none;margin-top:8px;overflow-x:auto}
  .tbl.on{display:block}
  .cbody.off{display:none}
  .tbl table{border-collapse:collapse;width:100%;font-size:11.5px}
  .tbl th,.tbl td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--hair-2);font-variant-numeric:tabular-nums;white-space:nowrap}
  .tbl th{color:var(--muted);font-weight:700;font-size:10px;letter-spacing:.04em;text-transform:uppercase}
  .tbl th:first-child,.tbl td:first-child{text-align:left}
  .tbl td:first-child{color:var(--ink-2);font-weight:600}

  /* shared tooltip */
  .tip{position:fixed;z-index:60;pointer-events:none;background:var(--ink);color:#fff;border-radius:10px;
       padding:8px 11px;font-size:11.5px;line-height:1.55;box-shadow:0 8px 24px -8px rgba(0,0,0,.4);
       opacity:0;transition:opacity .1s;max-width:230px}
  .tip.on{opacity:1}
  .tip .th{font-weight:800;font-size:10.5px;letter-spacing:.03em;margin-bottom:3px;color:#cfd4da}
  .tip .tr{display:flex;align-items:center;gap:7px;white-space:nowrap}
  .tip .tk{width:12px;height:3px;border-radius:2px;flex:none}
  .tip .tv{font-weight:800;margin-left:auto;padding-left:12px;font-variant-numeric:tabular-nums}

  .footnote{margin:16px 2px 0;font-size:10.5px;color:var(--faint);line-height:1.6}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a class="back" id="backLink" href="/" title="Back to the board" aria-label="Back to the board">‹</a>
    <div class="ttl"><div class="h1">Trends</div><div class="sub">Share of voice · sentiment · coverage — Vodafone Egypt</div></div>
    <div class="clock"><div class="t" id="clockTime">—</div><div class="d" id="clockDate">—</div></div>
  </header>

  <div class="bar2">
    <div class="frow" id="winRow"></div>
  </div>

  <main class="content" id="content"><div class="empty">Loading trends…</div></main>
</div>

<div class="tip" id="tip" role="status" aria-hidden="true"></div>

<script>
const $=(s,r=document)=>r.querySelector(s);
const esc=(s)=>String(s==null?'':s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const RM=matchMedia('(prefers-reduced-motion: reduce)').matches;

const params=new URLSearchParams(location.search);
const token=params.get('t')||localStorage.getItem('pr_token')||'';
if(params.get('t')) localStorage.setItem('pr_token',params.get('t'));
$('#backLink').href=token?`/?t=${encodeURIComponent(token)}`:'/';

// Brand series — FIXED order and entity-bound colors (never re-assigned when a
// series is empty). e& uses #00897d for chart marks: the brand's #00857b sits a
// hair under the OKLCH chroma floor (0.097 < 0.10) and reads gray at mark size;
// this is the nearest step of the same teal that passes the palette validator.
// Order V,O,WE,e& clears CVD ΔE (worst pair 13.9) and normal-vision (16.8)
// checks all-pairs on white. Orange sits at 2.63:1 contrast — relieved by the
// per-chart table view (⊞) and the always-on legend.
const SERIES=['Vodafone','Orange','WE','e&','Market'];
const CHART={Vodafone:'#e60000',Orange:'#ff7900',WE:'#7b1fa2','e&':'#00897d',Market:'#9aa2ad'};
const NEG='#e60000', POS='#0f9d58', NEU='#d3dae1';   // sentiment polarity (board's own)

let DATA=null; let fDays=Number(localStorage.getItem('pr_stats_days'))||30;

function clock(){
  const now=new Date();
  $('#clockDate').textContent=now.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',timeZone:'Africa/Cairo'}).toUpperCase();
  $('#clockTime').textContent=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Africa/Cairo'})+' CAI';
}
clock(); setInterval(clock,30000);

/* ── shared tooltip (DOM built with textContent — labels are untrusted data) ── */
const tip=$('#tip');
function tipShow(x,y,head,rows){
  tip.replaceChildren();
  const h=document.createElement('div'); h.className='th'; h.textContent=head; tip.appendChild(h);
  for(const r of rows){
    const d=document.createElement('div'); d.className='tr';
    if(r.color){ const k=document.createElement('span'); k.className='tk'; k.style.background=r.color; d.appendChild(k); }
    const l=document.createElement('span'); l.textContent=r.label; d.appendChild(l);
    const v=document.createElement('span'); v.className='tv'; v.textContent=r.value; d.appendChild(v);
    tip.appendChild(d);
  }
  tip.classList.add('on'); tip.setAttribute('aria-hidden','false');
  const w=tip.offsetWidth,h2=tip.offsetHeight;
  tip.style.left=Math.min(Math.max(8,x+14),innerWidth-w-8)+'px';
  tip.style.top=Math.min(Math.max(8,y-h2-12),innerHeight-h2-8)+'px';
}
function tipHide(){ tip.classList.remove('on'); tip.setAttribute('aria-hidden','true'); }

/* ── small helpers ── */
const fmtDay=(d)=>{ const t=new Date(d+'T12:00:00'); return t.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); };
const niceMax=(m)=>{ if(m<=5)return 5; const p=Math.pow(10,Math.floor(Math.log10(m))); const u=m/p; const s=u<=1?1:u<=2?2:u<=5?5:10; return s*p; };
const pct=(n,d)=>d?Math.round(n/d*100):0;
// 4px-rounded data-end at the top, square at the baseline (mark spec).
function topRect(x,y,w,h,r){ r=Math.min(r,h,w/2); if(h<=0||w<=0)return''; return `M${x},${y+h} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h} Z`; }

function legendHtml(names,shape){
  return `<div class="legend">${names.map(n=>`<span class="li"><span class="sw ${shape==='line'?'line':''}" style="background:${CHART[n]}"></span>${esc(n)}</span>`).join('')}</div>`;
}

/* ============================================================
   Chart builders — every chart returns {svg,bind,table}
   ============================================================ */

/* Share of voice — stacked columns per day, fixed stack order, 2px surface
   gaps between touching segments, rounded top on the stack's data-end. */
function sovChart(el){
  const {days,sov}=DATA;
  const active=SERIES.filter(b=>sov[b].mentions.some(v=>v>0));
  const W=el.clientWidth||600, plotH=190, padL=30, padR=6, padT=8, axisH=22, H=plotH+padT+axisH;
  const n=days.length, plotW=W-padL-padR;
  const band=plotW/n, bw=Math.min(24,Math.max(3,band-2));
  const totals=days.map((_,i)=>active.reduce((s,b)=>s+sov[b].mentions[i],0));
  const yMax=niceMax(Math.max(1,...totals));
  const y=v=>padT+plotH-(v/yMax*plotH);
  let g='';
  const ticks=[0,yMax/2,yMax].map(v=>Math.round(v));
  for(const t of ticks) g+=`<line class="gline" x1="${padL}" x2="${W-padR}" y1="${y(t)}" y2="${y(t)}"></line><text class="axis" x="${padL-5}" y="${y(t)+3}" text-anchor="end">${t}</text>`;
  const step=Math.max(1,Math.ceil(n/6));
  days.forEach((d,i)=>{ if(i%step===0||i===n-1) g+=`<text class="axis" x="${padL+i*band+band/2}" y="${H-6}" text-anchor="middle">${esc(fmtDay(d))}</text>`; });
  let bars='', hits='';
  days.forEach((d,i)=>{
    const x=padL+i*band+(band-bw)/2;
    let acc=0; const segs=[];
    for(const b of active){ const v=sov[b].mentions[i]; if(v>0){ segs.push([b,acc,v]); acc+=v; } }
    segs.forEach(([b,base,v],si)=>{
      const top=si===segs.length-1;
      // 2px surface gap at every internal boundary: each non-top segment's top
      // edge steps down 2px (the gap is the white card showing through). The
      // top segment keeps the 4px rounded data-end; the baseline stays square.
      const yTop=y(base+v)+(top?0:2);
      const h=Math.max(.75,y(base)-yTop);
      bars+= top
        ? `<path d="${topRect(x,yTop,bw,h,4)}" fill="${CHART[b]}"></path>`
        : `<rect x="${x}" y="${yTop}" width="${bw}" height="${h}" fill="${CHART[b]}"></rect>`;
    });
    hits+=`<rect data-i="${i}" x="${padL+i*band}" y="${padT}" width="${band}" height="${plotH}" fill="transparent"></rect>`;
  });
  const svg=`<svg viewBox="0 0 ${W} ${H}" height="${H}" role="img" aria-label="Mentions per brand per day">
    ${g}<line class="baseline" x1="${padL}" x2="${W-padR}" y1="${y(0)}" y2="${y(0)}"></line>${bars}<g class="hits">${hits}</g></svg>`;
  const bind=(root)=>{
    root.querySelectorAll('.hits rect').forEach(r=>{
      const i=Number(r.dataset.i);
      const show=(e)=>{ const pt=e.touches?e.touches[0]:e;
        tipShow(pt.clientX,pt.clientY,fmtDay(days[i])+' — '+totals[i]+' item'+(totals[i]===1?'':'s'),
          active.map(b=>({color:CHART[b],label:b,value:sov[b].mentions[i]+(sov[b].negatives[i]?` (${sov[b].negatives[i]} neg)`:'')})));
      };
      r.addEventListener('pointermove',show); r.addEventListener('pointerdown',show);
      r.addEventListener('pointerleave',tipHide);
    });
  };
  const table=()=>{
    let h='<table><caption class="axis" style="text-align:left;padding:2px 0 6px;color:var(--faint)">Mentions per brand per day (negatives in parentheses)</caption><thead><tr><th scope="col">Day</th>'+active.map(b=>`<th scope="col">${esc(b)}</th>`).join('')+'<th scope="col">Total</th></tr></thead><tbody>';
    days.forEach((d,i)=>{ if(!totals[i]) return;
      h+=`<tr><td>${esc(fmtDay(d))}</td>`+active.map(b=>{const m=sov[b].mentions[i],x=sov[b].negatives[i];return `<td>${m}${x?` (${x})`:''}</td>`;}).join('')+`<td><b>${totals[i]}</b></td></tr>`; });
    return h+'</tbody></table>';
  };
  return {legend:legendHtml(active,'rect'),svg,bind,table};
}

/* Negative coverage per day — 2px brand-colored lines, crosshair tooltip. */
function negChart(el){
  const {days,sov}=DATA;
  const active=SERIES.filter(b=>b!=='Market'&&sov[b].negatives.some(v=>v>0));
  const all=active.length?active:['Vodafone'];
  const W=el.clientWidth||600, plotH=150, padL=30, padR=8, padT=8, axisH=22, H=plotH+padT+axisH;
  const n=days.length, plotW=W-padL-padR;
  const xs=i=>padL+(n===1?plotW/2:i/(n-1)*plotW);
  const yMax=niceMax(Math.max(1,...all.flatMap(b=>sov[b].negatives)));
  const y=v=>padT+plotH-(v/yMax*plotH);
  let g='';
  for(const t of [0,yMax/2,yMax].map(v=>Math.round(v))) g+=`<line class="gline" x1="${padL}" x2="${W-padR}" y1="${y(t)}" y2="${y(t)}"></line><text class="axis" x="${padL-5}" y="${y(t)+3}" text-anchor="end">${t}</text>`;
  const step=Math.max(1,Math.ceil(n/6));
  // last tick anchors right so it never clips; ticks that would crowd it are skipped
  days.forEach((d,i)=>{ if(i===n-1||(i%step===0&&xs(i)<W-padR-40)) g+=`<text class="axis" x="${xs(i)}" y="${H-6}" text-anchor="${i===n-1?'end':'middle'}">${esc(fmtDay(d))}</text>`; });
  let lines='';
  for(const b of all){
    const pts=days.map((_,i)=>`${xs(i).toFixed(1)},${y(sov[b].negatives[i]).toFixed(1)}`).join(' ');
    lines+=`<polyline points="${pts}" fill="none" stroke="${CHART[b]}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></polyline>`;
  }
  const svg=`<svg viewBox="0 0 ${W} ${H}" height="${H}" role="img" aria-label="Negative items per brand per day">
    ${g}<line class="baseline" x1="${padL}" x2="${W-padR}" y1="${y(0)}" y2="${y(0)}"></line>${lines}
    <line class="xh" x1="0" x2="0" y1="${padT}" y2="${padT+plotH}" stroke="var(--faint)" stroke-width="1" opacity="0"></line>
    <g class="dots"></g>
    <rect class="hitall" x="${padL}" y="${padT}" width="${plotW}" height="${plotH}" fill="transparent"></rect></svg>`;
  const bind=(root)=>{
    const svgEl=root.querySelector('svg'), xh=root.querySelector('.xh'), dots=root.querySelector('.dots');
    const move=(e)=>{
      const box=svgEl.getBoundingClientRect(); const sc=box.width/W;
      const pt=e.touches?e.touches[0]:e;
      const px=(pt.clientX-box.left)/sc;
      const i=Math.max(0,Math.min(n-1,Math.round((px-padL)/(plotW||1)*(n-1))));
      xh.setAttribute('x1',xs(i)); xh.setAttribute('x2',xs(i)); xh.setAttribute('opacity','1');
      // hover markers: ≥8px dot with a 2px surface ring so they read over lines
      dots.replaceChildren(...all.map(b=>{ const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',xs(i)); c.setAttribute('cy',y(sov[b].negatives[i])); c.setAttribute('r','4.5');
        c.setAttribute('fill',CHART[b]); c.setAttribute('stroke','var(--card)'); c.setAttribute('stroke-width','2'); return c; }));
      tipShow(pt.clientX,pt.clientY,fmtDay(days[i])+' — negatives',
        all.map(b=>({color:CHART[b],label:b,value:String(sov[b].negatives[i])})));
    };
    const leave=()=>{ xh.setAttribute('opacity','0'); dots.replaceChildren(); tipHide(); };
    const hit=root.querySelector('.hitall');
    hit.addEventListener('pointermove',move); hit.addEventListener('pointerdown',move);
    hit.addEventListener('pointerleave',leave);
  };
  const table=()=>{
    let h='<table><thead><tr><th scope="col">Day</th>'+all.map(b=>`<th scope="col">${esc(b)}</th>`).join('')+'</tr></thead><tbody>';
    days.forEach((d,i)=>{ const tot=all.reduce((s,b)=>s+sov[b].negatives[i],0); if(!tot) return;
      h+=`<tr><td>${esc(fmtDay(d))}</td>`+all.map(b=>`<td>${sov[b].negatives[i]}</td>`).join('')+'</tr>'; });
    return h+'</tbody></table>';
  };
  return {legend:legendHtml(all,'line'),svg,bind,table};
}

/* Sentiment by brand — diverging stacked bars centered on neutral (ordered
   scale → diverging form; side-of-center + labels carry polarity, not hue alone). */
function sentimentChart(el){
  const s=DATA.sentimentByBrand;
  const rows=SERIES.filter(b=>s[b]&&s[b].total>0);
  const W=el.clientWidth||600, rowH=30, gap=8, padL=70, padR=34, H=rows.length*(rowH+gap)+6;
  const cx=padL+(W-padL-padR)/2;
  const maxSide=Math.max(1,...rows.map(b=>Math.max(s[b].negative+s[b].neutral/2,s[b].positive+s[b].neutral/2)));
  const sc=(W-padL-padR)/2/maxSide;
  let g='';
  rows.forEach((b,ri)=>{
    const yy=6+ri*(rowH+gap), h=14, ym=yy+(rowH-h)/2;
    const d=s[b], nh=d.neutral/2*sc;
    g+=`<text class="axis" x="${padL-8}" y="${ym+h/2+3.5}" text-anchor="end" style="font-weight:700;fill:var(--ink-2);font-size:11px">${esc(b)}</text>`;
    if(d.neutral>0) g+=`<rect x="${cx-nh}" y="${ym}" width="${nh*2}" height="${h}" fill="${NEU}" rx="2"></rect>`;
    if(d.negative>0) g+=`<rect x="${cx-nh-d.negative*sc}" y="${ym}" width="${Math.max(1,d.negative*sc-1)}" height="${h}" fill="${NEG}" rx="2"></rect>`;
    if(d.positive>0) g+=`<rect x="${cx+nh+1}" y="${ym}" width="${Math.max(1,d.positive*sc-1)}" height="${h}" fill="${POS}" rx="2"></rect>`;
    // direct labels at both data-ends: values are readable without color.
    // A long bar's outside label would collide with the brand name / edge —
    // measure and fall inside the bar (white on the fill) when it won't fit.
    if(d.negative>0){
      const bx=cx-nh-d.negative*sc, fits=bx-5-14>=padL;
      g+= fits
        ? `<text x="${bx-5}" y="${ym+h/2+3.5}" text-anchor="end" style="font-size:10.5px;font-weight:800;fill:var(--red-deep)">${d.negative}</text>`
        : `<text x="${bx+5}" y="${ym+h/2+3.5}" style="font-size:10.5px;font-weight:800;fill:#fff">${d.negative}</text>`;
    }
    if(d.positive>0){
      const bx=cx+nh+d.positive*sc, fits=bx+5+14<=W;
      g+= fits
        ? `<text x="${bx+5}" y="${ym+h/2+3.5}" style="font-size:10.5px;font-weight:800;fill:${POS}">${d.positive}</text>`
        : `<text x="${bx-5}" y="${ym+h/2+3.5}" text-anchor="end" style="font-size:10.5px;font-weight:800;fill:#fff">${d.positive}</text>`;
    }
    g+=`<rect class="hit" data-b="${esc(b)}" x="0" y="${yy}" width="${W}" height="${rowH}" fill="transparent"></rect>`;
  });
  g+=`<line x1="${cx}" x2="${cx}" y1="0" y2="${H}" stroke="var(--hair)" stroke-width="1"></line>`;
  const svg=`<svg viewBox="0 0 ${W} ${H}" height="${H}" role="img" aria-label="Sentiment split per brand">${g}</svg>`;
  const bind=(root)=>{
    root.querySelectorAll('.hit').forEach(r=>{
      const b=r.dataset.b, d=s[b];
      const show=(e)=>{ const pt=e.touches?e.touches[0]:e;
        tipShow(pt.clientX,pt.clientY,b+' — '+d.total+' item'+(d.total===1?'':'s'),[
          {color:NEG,label:'Negative',value:String(d.negative)},
          {color:NEU,label:'Neutral',value:String(d.neutral)},
          {color:POS,label:'Positive',value:String(d.positive)},
        ]); };
      r.addEventListener('pointermove',show); r.addEventListener('pointerdown',show);
      r.addEventListener('pointerleave',tipHide);
    });
  };
  const table=()=>{
    let h='<table><thead><tr><th scope="col">Brand</th><th scope="col">Negative</th><th scope="col">Neutral</th><th scope="col">Positive</th><th scope="col">Total</th></tr></thead><tbody>';
    rows.forEach(b=>{ const d=s[b]; h+=`<tr><td>${esc(b)}</td><td>${d.negative}</td><td>${d.neutral}</td><td>${d.positive}</td><td><b>${d.total}</b></td></tr>`; });
    return h+'</tbody></table>';
  };
  return {legend:`<div class="legend"><span class="li"><span class="sw" style="background:${NEG}"></span>Negative</span><span class="li"><span class="sw" style="background:${NEU}"></span>Neutral</span><span class="li"><span class="sw" style="background:${POS}"></span>Positive</span></div>`,svg,bind,table};
}

/* Sparkline for category rows — single muted line, 1.5px, no axis. */
function sparkSvg(series,w,h){
  const max=Math.max(1,...series);
  const n=series.length;
  const pts=series.map((v,i)=>`${(n===1?w/2:i/(n-1)*w).toFixed(1)},${(h-2-(v/max*(h-4))).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="var(--faint)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"></polyline></svg>`;
}

/* Categories — table-chart hybrid rows: total bar with the negative share as
   the red emphasis segment, plus a per-day sparkline. Values printed on every
   row (this IS the table channel, so full labelling is correct here). */
function categoryRows(){
  const cats=DATA.categories.filter(c=>c.total>0);
  if(!cats.length) return {rows:'<div class="empty" style="padding:22px">No categorised coverage in this window.</div>',table:()=>''};
  const max=Math.max(...cats.map(c=>c.total));
  const rows=cats.map(c=>{
    const negW=pct(c.negative,max), restW=pct(c.total-c.negative,max);
    const name=String(c.category).replace(/_/g,' ');
    return `<div class="lrow">
      <span class="nm" title="${esc(name)}">${esc(name)}</span>
      <span class="spark">${sparkSvg(c.series,72,20)}</span>
      <span class="bar" aria-hidden="true">${c.negative?`<i style="width:${negW}%;background:${NEG}"></i>`:''}${c.total-c.negative?`<i style="width:${restW}%;background:var(--neu);opacity:.35"></i>`:''}</span>
      <span class="val"><b>${c.total}</b>${c.negative?` · <b class="neg">${c.negative} neg</b>`:''}</span>
    </div>`;
  }).join('');
  const table=()=>{
    let h='<table><thead><tr><th scope="col">Category</th><th scope="col">Items</th><th scope="col">Negative</th><th scope="col">Vodafone-negative</th></tr></thead><tbody>';
    cats.forEach(c=>{ h+=`<tr><td>${esc(String(c.category).replace(/_/g,' '))}</td><td>${c.total}</td><td>${c.negative}</td><td>${c.vodNeg}</td></tr>`; });
    return h+'</tbody></table>';
  };
  return {rows,table};
}

/* Outlet / author intelligence — one row per journalist/outlet: bar length is
   VOLUME (mentions vs the busiest), split into their own negative/neutral/
   positive SENTIMENT mix; a sparkline shows their activity over the window; and
   repeat-negative behaviour is flagged. "Repeat critic" = 2+ Vodafone-negative
   stories; "negative-leaning" = ≥3 stories and majority negative. */
function leaderboardRows(list,kind){
  if(!list.length) return {rows:`<div class="empty" style="padding:22px">No ${kind} data in this window.</div>`,table:()=>''};
  const max=Math.max(...list.map(o=>o.mentions));
  const rows=list.map(o=>{
    const name=kind==='outlet'?o.outlet:o.author;
    const negShare=pct(o.negative,o.mentions);
    const critic=kind==='author'&&o.vodNeg>=2;
    const leaning=o.mentions>=3&&negShare>=50;
    const flags=`${critic?`<span class="badge">repeat critic</span>`:''}${leaning?`<span class="badge lean">negative-leaning</span>`:''}`;
    const sub=kind==='author'&&o.outlets&&o.outlets.length?`<span class="sub">${esc(o.outlets.join(' · '))}</span>`:'';
    // Volume-scaled sentiment bar: segment widths are % of the busiest row, so
    // bar LENGTH reads as volume and the colour split reads as sentiment mix.
    const seg=(n,c,op)=>n?`<i style="width:${pct(n,max)}%;background:${c}${op?`;opacity:${op}`:''}"></i>`:'';
    const bar=seg(o.negative,NEG)+seg(o.neutral,'var(--neu)','.35')+seg(o.positive,POS);
    const spark=o.series?sparkSvg(o.series,72,20):'';
    return `<div class="lrow">
      <span class="nm" title="${esc(name)}">${esc(name)}${flags}${sub}</span>
      <span class="spark">${spark}</span>
      <span class="bar" aria-hidden="true">${bar}</span>
      <span class="val"><b>${o.mentions}</b> · ${negShare}% neg${o.vodNeg?` · <b class="neg">${o.vodNeg} Vod</b>`:''}</span>
    </div>`;
  }).join('');
  const table=()=>{
    let h=`<table><thead><tr><th scope="col">${kind==='outlet'?'Outlet':'Author'}</th><th scope="col">Stories</th><th scope="col">Neg</th><th scope="col">Neu</th><th scope="col">Pos</th><th scope="col">Vod-neg</th></tr></thead><tbody>`;
    list.forEach(o=>{ h+=`<tr><td>${esc(kind==='outlet'?o.outlet:o.author)}</td><td>${o.mentions}</td><td>${o.negative}</td><td>${o.neutral}</td><td>${o.positive}</td><td>${o.vodNeg}</td></tr>`; });
    return h+'</tbody></table>';
  };
  return {rows,table};
}

/* ============================================================
   Page assembly
   ============================================================ */

function kpiHtml(){
  const t=DATA.totals;
  const sovPct=pct(t.vodafone.mentions,t.items);
  return `<div class="kpis">
    <div class="kpi"><div class="kl">Tracked items</div><div class="kv">${t.items}</div><div class="ks">last ${DATA.meta.days}d · board scope</div></div>
    <div class="kpi"><div class="kl">Negative</div><div class="kv ${t.negatives?'neg':''}">${t.negatives}</div><div class="ks">${pct(t.negatives,t.items)}% of coverage</div></div>
    <div class="kpi"><div class="kl">Vodafone share of voice</div><div class="kv">${sovPct}%</div><div class="ks">${t.vodafone.mentions} mentions · ${t.vodafone.negatives} negative</div></div>
    <div class="kpi"><div class="kl">Outlets covering</div><div class="kv">${t.distinctOutlets}</div><div class="ks">distinct publications</div></div>
  </div>`;
}

function cardHtml(id,title,sub){
  return `<section class="cardc" id="${id}">
    <div class="chead"><span class="ct">${esc(title)}</span><span class="cs">${esc(sub)}</span>
      <button class="tgl" type="button" data-for="${id}" aria-pressed="false" title="Toggle table view">⊞ Table</button></div>
    <div class="clegend"></div><div class="cbody"></div><div class="tbl" role="region" aria-label="${esc(title)} — data table"></div>
  </section>`;
}

const CHARTS=[
  {id:'c-sov',   title:'Share of voice',      sub:'mentions per brand per day', build:el=>sovChart(el)},
  {id:'c-neg',   title:'Negative coverage',   sub:'negative items per brand per day', build:el=>negChart(el)},
  {id:'c-sent',  title:'Sentiment by brand',  sub:'negative ◂ neutral ▸ positive', build:el=>sentimentChart(el)},
];

function renderCharts(){
  for(const c of CHARTS){
    const card=$('#'+c.id); if(!card) continue;
    const body=card.querySelector('.cbody');
    const built=c.build(body);
    card.querySelector('.clegend').innerHTML=built.legend||'';
    body.innerHTML=built.svg;
    if(built.bind) built.bind(body);
    card.querySelector('.tbl').innerHTML=built.table();
  }
}

function render(){
  const c=$('#content');
  if(!DATA||!DATA.totals.items){
    c.innerHTML=`${DATA?kpiHtml():''}<div class="empty">No relevant coverage stored in the last ${fDays} days.<br>Trends build up as the daily pipeline runs.</div>`;
    return;
  }
  const cats=categoryRows();
  const outs=leaderboardRows(DATA.outlets,'outlet');
  const auth=leaderboardRows(DATA.authors,'author');
  c.innerHTML=kpiHtml()
    +CHARTS.map(x=>cardHtml(x.id,x.title,x.sub)).join('')
    +cardHtml('c-cat','Categories','volume · trend · negative share')
    +cardHtml('c-out','Outlet intelligence','volume · sentiment split · trend · negative-leaning flagged')
    +cardHtml('c-auth','Journalist intelligence','volume · sentiment split · trend · repeat critics flagged')
    +`<div class="footnote">Counts use the board's scope (relevant items, last ${fDays} days, Cairo days). Outlet/author counts include every outlet that ran a story (coverage instances), so they can exceed the item count. e&amp; marks use a validated chart-legible step of the brand teal.</div>`;
  renderCharts();
  $('#c-cat .cbody').innerHTML=`<div class="rows">${cats.rows}</div>`; $('#c-cat .tbl').innerHTML=cats.table();
  $('#c-out .cbody').innerHTML=`<div class="rows">${outs.rows}</div>`; $('#c-out .tbl').innerHTML=outs.table();
  $('#c-auth .cbody').innerHTML=`<div class="rows">${auth.rows}</div>`; $('#c-auth .tbl').innerHTML=auth.table();
  // table-view toggles (the accessible twin of every chart)
  c.querySelectorAll('.tgl').forEach(b=>b.onclick=()=>{
    const card=$('#'+b.dataset.for); const on=b.getAttribute('aria-pressed')!=='true';
    b.setAttribute('aria-pressed',String(on)); b.textContent=on?'▦ Chart':'⊞ Table';
    card.querySelector('.tbl').classList.toggle('on',on);
    card.querySelector('.cbody').classList.toggle('off',on);
    const lg=card.querySelector('.clegend'); if(lg) lg.style.display=on?'none':'';
  });
}

function buildFilters(){
  const win=$('#winRow');
  const opts=[['7','Week'],['14','2 weeks'],['30','Month'],['60','2 months'],['90','Quarter']];
  win.innerHTML=`<span class="flabel">Window</span>`+opts.map(([v,l])=>`<button class="chip" type="button" data-v="${v}" aria-pressed="${String(fDays)===v}">${l}</button>`).join('');
  win.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
    fDays=Number(ch.dataset.v); localStorage.setItem('pr_stats_days',ch.dataset.v);
    win.querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed',String(x.dataset.v===ch.dataset.v)));
    load();
  });
}

let loading=false;
async function load(){
  if(!token){ $('#content').innerHTML=`<div class="gate">This page is private.<br>Open it with your access link: <code>/stats?t=YOUR_TOKEN</code></div>`; return; }
  if(loading) return; loading=true;
  // refetch keeps the frame: fade the previous render, no skeleton flash
  const prev=$('#content'); if(DATA) prev.style.opacity='.45';
  try{
    const r=await fetch(`/api/stats?t=${encodeURIComponent(token)}&days=${fDays}`);
    if(r.status===401){ $('#content').innerHTML=`<div class="gate">That access link was rejected.<br>Check the token and try again.</div>`; return; }
    DATA=await r.json();
    render();
  }catch(e){
    $('#content').innerHTML=`<div class="empty">Couldn't load trends.<br>${esc(e.message||e)}</div>`;
  }finally{ loading=false; prev.style.opacity=''; }
}

let rzT=null;
addEventListener('resize',()=>{ clearTimeout(rzT); rzT=setTimeout(()=>{ if(DATA&&DATA.totals.items) renderCharts(); },150); });

buildFilters();
load();
</script>

</html>
