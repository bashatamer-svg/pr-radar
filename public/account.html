<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change password · PR Radar</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#e60000">
<style>
  :root{
    --red:#e60000; --bg:#f1f2f5; --card:#fff; --ink:#16191f; --ink-2:#3b434e; --muted:#6c7480; --faint:#9aa2ad; --hair:#e7e9ee;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
       min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--hair);border-radius:18px;overflow:hidden;
        box-shadow:0 12px 40px rgba(16,20,28,.08)}
  .head{background:var(--red);padding:20px 26px;display:flex;align-items:center;gap:11px}
  .mark{width:34px;height:34px;border-radius:9px;background:#fff;color:var(--red);font-weight:800;font-size:13px;display:grid;place-items:center}
  .head .h1{color:#fff;font-weight:800;font-size:16px}
  .head .sub{color:rgba(255,255,255,.82);font-size:11px}
  .body{padding:24px 26px 26px}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin:12px 0 6px}
  input{width:100%;font-size:15px;padding:12px 13px;border:1px solid var(--hair);border-radius:11px;background:#fbfcfd;font-family:inherit;color:var(--ink)}
  input:focus{outline:2px solid var(--red);outline-offset:1px;border-color:transparent}
  .showpw{display:flex;align-items:center;gap:7px;margin-top:11px;font-size:12px;color:var(--muted);cursor:pointer}
  .showpw input{width:auto;margin:0}
  .row{display:flex;gap:8px;margin-top:18px}
  button{flex:1;cursor:pointer;border:0;font-weight:700;font-size:14px;padding:12px;border-radius:11px;font-family:inherit}
  .go{background:var(--red);color:#fff}
  .go:disabled{opacity:.6;cursor:default}
  .back{background:#fbfcfd;color:var(--ink-2);border:1px solid var(--hair);text-decoration:none;text-align:center;display:grid;place-items:center}
  .msg{margin-top:15px;font-size:13px;line-height:1.5;padding:11px 13px;border-radius:11px;display:none}
  .msg.show{display:block}
  .msg.ok{background:#edfaf1;color:#0c7a43;border:1px solid #c3e9d1}
  .msg.err{background:#fff2f0;color:#b60009;border:1px solid #ffd4cf}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="mark">PR</div>
      <div><div class="h1">Change password</div><div class="sub" id="who">PR Radar</div></div>
    </div>
    <div class="body">
      <form id="form">
        <label for="current">Current password</label>
        <input type="password" id="current" autocomplete="current-password" required>
        <label for="next">New password</label>
        <input type="password" id="next" autocomplete="new-password" placeholder="At least 8 characters" required>
        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" autocomplete="new-password" required>
        <label class="showpw"><input type="checkbox" id="showpw"> Show passwords</label>
        <div class="row">
          <a class="back" href="/">Back</a>
          <button class="go" id="btn" type="submit">Update password</button>
        </div>
      </form>
      <div class="msg" id="msg"></div>
    </div>
  </div>
<script>
  const $=(s)=>document.querySelector(s);
  let session=(()=>{ try{ return JSON.parse(localStorage.getItem('pr_session')||'null'); }catch(e){ return null; } })();
  if(!session){ location.replace('/login'); }
  let _cfg=null;
  async function authConfig(){ if(_cfg) return _cfg; try{ _cfg=await (await fetch('/api/auth?view=config')).json(); }catch(e){ _cfg={}; } return _cfg; }
  async function refreshSession(){ if(!session?.refresh_token) return false; const c=await authConfig(); if(!c.supabaseUrl||!c.anonKey) return false;
    try{ const r=await fetch(`${c.supabaseUrl}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{apikey:c.anonKey,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:session.refresh_token})}); if(!r.ok) return false; const d=await r.json(); if(!d.access_token) return false; session={access_token:d.access_token,refresh_token:d.refresh_token||session.refresh_token}; try{ localStorage.setItem('pr_session',JSON.stringify(session)); }catch(e){} return true; }catch(e){ return false; } }
  async function afetch(path,opts={},_retried){ const o={...opts,headers:{...(opts.headers||{})}}; if(session) o.headers.Authorization=`Bearer ${session.access_token}`; const r=await fetch(path,o); if(r.status===401 && session && !_retried && await refreshSession()) return afetch(path,opts,true); return r; }

  // Greet with the signed-in email.
  (async()=>{ try{ const r=await afetch('/api/auth?view=me'); if(r.ok){ const me=await r.json(); if(me.email) $('#who').textContent=me.email; } else if(r.status===401){ location.replace('/login'); } }catch(e){} })();

  const msg=$('#msg'), btn=$('#btn');
  function show(kind,html){ msg.className='msg show '+kind; msg.innerHTML=html; }
  $('#showpw').onchange=(e)=>{ const t=e.target.checked?'text':'password'; $('#current').type=t; $('#next').type=t; $('#confirm').type=t; };

  $('#form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const current=$('#current').value, next=$('#next').value, confirm=$('#confirm').value;
    if(next.length<8){ show('err','New password must be at least 8 characters.'); return; }
    if(next!==confirm){ show('err','The two new passwords don’t match.'); return; }
    btn.disabled=true; btn.textContent='Updating…';
    try{
      const r=await afetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'change_password',current,password:next})});
      const d=await r.json().catch(()=>({}));
      if(r.ok){ show('ok','Password updated. You can keep using the board.'); $('#form').reset(); }
      else if(r.status===401){ show('err', d.error || 'Your current password is incorrect.'); }
      else { show('err', d.error || 'Could not update your password.'); }
    }catch(err){ show('err','Network error. Please try again.'); }
    btn.disabled=false; btn.textContent='Update password';
  });
</script>
</body>
</html>
